<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D 바둑 교실 — Tobmate</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#000;font-family:monospace}
#info{position:fixed;top:10px;left:10px;color:#27AE60;font-size:12px;z-index:10;background:rgba(0,0,0,0.6);padding:8px 12px;border-radius:8px}
#bubble{position:fixed;top:10px;right:10px;max-width:300px;background:rgba(10,10,26,0.92);border:1px solid #27AE60;border-radius:12px;padding:12px;color:#ddd;font-size:13px;line-height:1.6;z-index:10;display:none}
#bubble .nm{color:#27AE60;font-weight:bold;font-size:11px;margin-bottom:4px}
#aiLabel{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);color:#666;font-size:10px;z-index:10}
#turnInfo{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);color:#ddd;font-size:13px;z-index:10;background:rgba(0,0,0,0.6);padding:6px 14px;border-radius:8px}
</style>
</head>
<body>
<div id="info">🏫 3D 바둑 교실 (S18) — 드래그: 회전 / 휠: 줌 / 바둑판 클릭: 착수</div>
<div id="bubble"><div class="nm">🧑‍🏫 AI 선생님</div><div id="bubbleText"></div></div>
<div id="turnInfo">⚫ 흑 차례</div>
<div id="ctrl" style="position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px">
  <button onclick="openSettings()" style="background:rgba(10,10,26,0.9);border:1px solid #9b59b6;color:#9b59b6;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:12px">⚙ 설정</button>
  <button id="sunjangBtn" onclick="toggleSunjang(this)" style="background:rgba(10,10,26,0.9);border:1px solid #7f8c8d;color:#ddd;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:12px">⚪ 보통</button>
  <button onclick="undoMove()" style="background:rgba(10,10,26,0.9);border:1px solid #27AE60;color:#ddd;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:12px">◀ 이전</button>
  <button onclick="redoMove()" style="background:rgba(10,10,26,0.9);border:1px solid #27AE60;color:#ddd;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:12px">다음 ▶</button>
  <button onclick="startScoring()" style="background:rgba(10,10,26,0.9);border:1px solid #f1c40f;color:#f1c40f;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:12px">📊 계가</button>
  <button onclick="resetBoard3D()" style="background:rgba(10,10,26,0.9);border:1px solid #e74c3c;color:#ddd;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:12px">↺ 초기화</button>
  <button onclick="exportSGF()" style="background:rgba(10,10,26,0.9);border:1px solid #F5A623;color:#F5A623;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:12px">💾 SGF 저장</button>
  <button onclick="buildPlanets()" style="background:rgba(10,10,26,0.9);border:1px solid #1ABC9C;color:#1ABC9C;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:12px">🌍 행성 만들기</button>
</div>
<div id="aiLabel">🤖 AI 생성 음성/해설 — 3D 가상 교실</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// === 기본 3D 공간 ===
// === 다국어 (6개 언어 + 코드 정규화) ===
const _rawLang = new URLSearchParams(location.search).get('lang') || localStorage.getItem('lang') || 'ko';
const C3D_LANG = ({cn:'zh', jp:'ja', kp:'ko'})[_rawLang] || _rawLang;
const C3D_T = {
  ko:{info:'🏫 3D 바둑 교실 (S18) — 드래그: 회전 / 휠: 줌 / 바둑판 클릭: 착수', teacher:'🧑‍🏫 AI 선생님', black:'⚫ 흑 차례', white:'⚪ 백 차례', prev:'◀ 이전', next:'다음 ▶', reset:'↺ 초기화', ai:'🤖 AI 생성 음성/해설 — 3D 가상 교실',
    greet:'어서 오세요! 3D 바둑 교실에 오신 것을 환영합니다. 바둑판을 클릭해서 돌을 놓아보세요. 제가 한 수 한 수 해설해 드릴게요!'},
  en:{info:'🏫 3D Go Classroom (S18) — Drag: rotate / Wheel: zoom / Click board: play', teacher:'🧑‍🏫 AI Teacher', black:'⚫ Black to play', white:'⚪ White to play', prev:'◀ Prev', next:'Next ▶', reset:'↺ Reset', ai:'🤖 AI-generated voice/commentary — 3D virtual classroom',
    greet:'Welcome to the 3D Go Classroom! Click the board to place a stone, and I will explain each move for you.'},
  zh:{info:'🏫 3D围棋教室 (S18) — 拖动:旋转 / 滚轮:缩放 / 点击棋盘:落子', teacher:'🧑‍🏫 AI老师', black:'⚫ 黑棋回合', white:'⚪ 白棋回合', prev:'◀ 上一手', next:'下一手 ▶', reset:'↺ 重置', ai:'🤖 AI生成语音/解说 — 3D虚拟教室',
    greet:'欢迎来到3D围棋教室！点击棋盘落子，我会为您讲解每一手棋。'},
  ja:{info:'🏫 3D囲碁教室 (S18) — ドラッグ:回転 / ホイール:ズーム / 盤クリック:着手', teacher:'🧑‍🏫 AI先生', black:'⚫ 黒番', white:'⚪ 白番', prev:'◀ 前へ', next:'次へ ▶', reset:'↺ リセット', ai:'🤖 AI生成音声/解説 — 3D仮想教室',
    greet:'3D囲碁教室へようこそ！盤面をクリックして石を置いてください。一手ずつ解説いたします。'},
  ru:{info:'🏫 3D класс го (S18) — Перетаскивание: вращение / Колесо: масштаб / Клик по доске: ход', teacher:'🧑‍🏫 ИИ-учитель', black:'⚫ Ход чёрных', white:'⚪ Ход белых', prev:'◀ Назад', next:'Вперёд ▶', reset:'↺ Сброс', ai:'🤖 Голос/комментарии ИИ — 3D виртуальный класс',
    greet:'Добро пожаловать в 3D класс го! Кликните по доске, чтобы поставить камень, и я объясню каждый ход.'},
  ar:{info:'🏫 فصل الغو ثلاثي الأبعاد (S18) — اسحب: تدوير / العجلة: تكبير / انقر اللوحة: العب', teacher:'🧑‍🏫 معلم الذكاء الاصطناعي', black:'⚫ دور الأسود', white:'⚪ دور الأبيض', prev:'◀ السابق', next:'التالي ▶', reset:'↺ إعادة', ai:'🤖 صوت/تعليق مولد بالذكاء الاصطناعي',
    greet:'مرحباً بكم في فصل الغو ثلاثي الأبعاد! انقر على اللوحة لوضع حجر وسأشرح لك كل نقلة.'}
};
const T3 = C3D_T[C3D_LANG] || C3D_T.ko;
document.addEventListener('DOMContentLoaded',function(){
  var el;
  if(el=document.getElementById('info')) el.textContent = T3.info;
  if(el=document.querySelector('#bubble .nm')) el.textContent = T3.teacher;
  if(el=document.getElementById('turnInfo')) el.textContent = T3.black;
  if(el=document.getElementById('aiLabel')) el.textContent = T3.ai;
  document.querySelectorAll('button[onclick="undoMove()"]').forEach(b=>b.textContent=T3.prev);
  document.querySelectorAll('button[onclick="redoMove()"]').forEach(b=>b.textContent=T3.next);
  document.querySelectorAll('button[onclick="resetBoard3D()"]').forEach(b=>b.textContent=T3.reset);
  if(C3D_LANG==='ar') document.body.style.direction='rtl';
});
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020014);
scene.fog = new THREE.Fog(0x020014, 15, 40);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// 조명
scene.add(new THREE.AmbientLight(0x404060, 1.2));
const spot = new THREE.SpotLight(0xffffff, 1.0);
spot.position.set(5, 15, 8); spot.castShadow = true;
scene.add(spot);
const rim = new THREE.PointLight(0x27AE60, 0.6, 30);
rim.position.set(-8, 6, -5);
scene.add(rim);

// 우주 별
const starGeo = new THREE.BufferGeometry();
const STAR_N = 1800;
const starPos = new Float32Array(STAR_N*3);
for(let i=0;i<STAR_N;i++){
  starPos[i*3] = (Math.random()-0.5)*90;
  starPos[i*3+1] = Math.random()*45-5;
  starPos[i*3+2] = (Math.random()-0.5)*90;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
// 원형 파티클 텍스처 생성 (부드러운 원 + 글로우)
function makeCircleTexture(){
  const cv = document.createElement('canvas');
  cv.width = cv.height = 64;
  const ctx = cv.getContext('2d');
  const g = ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.4,'rgba(255,255,255,0.8)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(cv);
}
const circleTex = makeCircleTexture();

// 무지개색 정점 컬러
const starCol = new Float32Array(STAR_N*3);
for(let i=0;i<STAR_N;i++){
  const col = new THREE.Color().setHSL(Math.random(), 0.85, 0.65);
  starCol[i*3]=col.r; starCol[i*3+1]=col.g; starCol[i*3+2]=col.b;
}
starGeo.setAttribute('color', new THREE.BufferAttribute(starCol,3));
const starMat = new THREE.PointsMaterial({size:0.16,map:circleTex,transparent:true,opacity:0.95,vertexColors:true,depthWrite:false,blending:THREE.AdditiveBlending});
const starField = new THREE.Points(starGeo, starMat);
scene.add(starField);

// 근거리 반짝이 파티클 (무지개, 크게)
const spkGeo = new THREE.BufferGeometry();
const SPK_N = 250;
const spkPos = new Float32Array(SPK_N*3);
const spkCol = new Float32Array(SPK_N*3);
for(let i=0;i<SPK_N;i++){
  spkPos[i*3] = (Math.random()-0.5)*30;
  spkPos[i*3+1] = Math.random()*12;
  spkPos[i*3+2] = (Math.random()-0.5)*30;
  const col = new THREE.Color().setHSL(i/SPK_N, 1.0, 0.6);
  spkCol[i*3]=col.r; spkCol[i*3+1]=col.g; spkCol[i*3+2]=col.b;
}
spkGeo.setAttribute('position', new THREE.BufferAttribute(spkPos,3));
spkGeo.setAttribute('color', new THREE.BufferAttribute(spkCol,3));
const spkMat = new THREE.PointsMaterial({size:0.28,map:circleTex,transparent:true,opacity:0.8,vertexColors:true,depthWrite:false,blending:THREE.AdditiveBlending});
const sparkles = new THREE.Points(spkGeo, spkMat);
scene.add(sparkles);

// 바닥
const floor = new THREE.Mesh(
  new THREE.CylinderGeometry(14,14,0.3,48),
  new THREE.MeshStandardMaterial({color:0x0a0a1e, metalness:0.6, roughness:0.4})
);
floor.position.y = -0.15; floor.receiveShadow = true;
scene.add(floor);

// === 3D 바둑판 (19로) ===
const N = 19, CELL = 0.35, BOARD = CELL*(N-1);
const boardGroup = new THREE.Group();
// 실제 강의실 나무 텍스처 (board.jpg) 적용
const woodTex = new THREE.TextureLoader().load('/assets/img/board.jpg');
woodTex.wrapS = woodTex.wrapT = THREE.ClampToEdgeWrapping;
const woodTopMat = new THREE.MeshStandardMaterial({map:woodTex, roughness:0.65});
const woodSideMat = new THREE.MeshStandardMaterial({color:0xa87820, roughness:0.75});
const boardMesh = new THREE.Mesh(
  new THREE.BoxGeometry(BOARD+0.8, 0.35, BOARD+0.8),
  [woodSideMat, woodSideMat, woodTopMat, woodSideMat, woodSideMat, woodSideMat]
);
boardMesh.position.y = 0.9; boardMesh.castShadow = true;
boardGroup.add(boardMesh);

// 선 그리기
const lineMat = new THREE.LineBasicMaterial({color:0x2a1a00});
for(let i=0;i<N;i++){
  const off = -BOARD/2 + i*CELL;
  [[[-BOARD/2,off],[BOARD/2,off]],[[off,-BOARD/2],[off,BOARD/2]]].forEach(([[x1,z1],[x2,z2]])=>{
    const g = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x1,1.08,z1), new THREE.Vector3(x2,1.08,z2)
    ]);
    boardGroup.add(new THREE.Line(g, lineMat));
  });
}
// 화점
[[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]].forEach(([r,c])=>{
  const dot = new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.045,0.02,12), new THREE.MeshBasicMaterial({color:0x2a1a00}));
  dot.position.set(-BOARD/2+c*CELL, 1.09, -BOARD/2+r*CELL);
  boardGroup.add(dot);
});
scene.add(boardGroup);

// ===== 오른쪽 위 고정 참고도 창 (별도 3D 뷰) =====
(function(){
  // 참고도 전용 컨테이너 (AI 선생님 모달 밑)
  var refBox = document.createElement('div');
  refBox.id = 'ref-view-box';
  refBox.style.cssText = 'position:fixed;right:16px;top:300px;width:320px;height:320px;z-index:500;background:rgba(6,12,26,0.9);border:2px solid #4A90D9;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(74,144,217,0.4);';
  var refLabel = document.createElement('div');
  refLabel.style.cssText = 'position:absolute;top:0;left:0;right:0;height:30px;background:rgba(10,20,40,0.95);color:#7fd4ff;font:bold 13px monospace;display:flex;align-items:center;padding:0 12px;z-index:2;border-bottom:1px solid rgba(74,144,217,0.3);';
  refLabel.innerText = '📋 참고도';
  refBox.appendChild(refLabel);
  document.body.appendChild(refBox);

  // 별도 씬/카메라/렌더러
  var refScene = new THREE.Scene();
  var refCam = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
  refCam.position.set(0, 7, 9);
  refCam.lookAt(0, 0, 0);
  var refRenderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  refRenderer.setSize(320, 290);
  refRenderer.domElement.style.marginTop = '30px';
  refBox.appendChild(refRenderer.domElement);

  // 조명
  refScene.add(new THREE.AmbientLight(0xffffff, 0.7));
  var rl = new THREE.DirectionalLight(0xffffff, 0.6); rl.position.set(5,10,7); refScene.add(rl);

  // 참고판 (메인판 복제)
  var refBoard = boardGroup.clone();
  refBoard.position.set(0, -0.9, 0);  // 중앙 정렬
  refScene.add(refBoard);

  window._refScene = refScene;
  window._refBoard = refBoard;
  window._refRenderer = refRenderer;
  window._refCam = refCam;
  window._refStones = [];

  // 렌더 루프
  (function refLoop(){
    requestAnimationFrame(refLoop);
    if(window._refRotating) refBoard.rotation.y += 0.006;
    refRenderer.render(refScene, refCam);
  })();
})();

// 참고도 돌 배치/제거
function _refNumSprite(txt, isBlack){
  var cv=document.createElement('canvas'); cv.width=64; cv.height=64;
  var ctx=cv.getContext('2d');
  ctx.fillStyle=isBlack?'#fff':'#111'; ctx.font='bold 40px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(txt,32,34);
  var tex=new THREE.CanvasTexture(cv);
  var spr=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
  spr.scale.set(0.3,0.3,1); return spr;
}
function showReference(list){
  clearReference();
  var rb = window._refBoard;
  (list||[]).forEach(function(s){
    var mesh = new THREE.Mesh(
      new THREE.SphereGeometry(CELL*0.46, 20, 14),
      new THREE.MeshStandardMaterial({color:(s.c==='b'||s.b)?0x111111:0xf5f5f5, roughness:0.3, metalness:0.1})
    );
    mesh.scale.y = 0.55;
    mesh.position.set(-BOARD/2 + s.x*CELL, 1.16, -BOARD/2 + s.y*CELL);
    rb.add(mesh); window._refStones.push(mesh);
    if(s.n){
      var num=_refNumSprite(String(s.n),(s.c==='b'||s.b));
      num.position.set(-BOARD/2 + s.x*CELL, 1.5, -BOARD/2 + s.y*CELL);
      rb.add(num); window._refStones.push(num);
    }
  });
}
function clearReference(){
  if(!window._refStones) return;
  window._refStones.forEach(function(m){ window._refBoard.remove(m); });
  window._refStones = [];
}
window.showReference = showReference;
window.clearReference = clearReference;

// ===== 참고판 대국 기능 (착수/수순/사석/정지재생) =====
window._refRotating = true;
window._refHistory = [];   // 참고판 수순 [{c,r,b}]
window._refHistPos = 0;
window._refTurnBlack = true;

// 참고판 좌표변환 착수용 raycaster
(function(){
  var rRay = new THREE.Raycaster(), rMouse = new THREE.Vector2();
  var refCanvas = window._refRenderer.domElement;
  // 참고판 클릭면(투명 평면) — refBoard 안 boardMesh 못 쓰니 별도 평면
  var hitPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(BOARD+0.8, BOARD+0.8),
    new THREE.MeshBasicMaterial({visible:false})
  );
  hitPlane.rotation.x = -Math.PI/2;
  hitPlane.position.y = 1.16;
  window._refBoard.add(hitPlane);
  window._refHitPlane = hitPlane;

  refCanvas.addEventListener('click', function(e){
    if(window._refRotating) return; // 회전 중엔 착수 막음 (정지 후 착수)
    if(window._refDragMoved){ window._refDragMoved=false; return; } // 드래그면 착수 안 함
    var rect = refCanvas.getBoundingClientRect();
    rMouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
    rMouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
    rRay.setFromCamera(rMouse, window._refCam);
    var hit = rRay.intersectObject(window._refHitPlane);
    if(!hit.length) return;
    // refBoard 로컬좌표로 변환
    var lp = window._refBoard.worldToLocal(hit[0].point.clone());
    var cc = Math.round((lp.x + BOARD/2)/CELL);
    var rr = Math.round((lp.z + BOARD/2)/CELL);
    if(cc<0||cc>=N||rr<0||rr>=N) return;
    refApplyMove(cc, rr);
  });
})();

function _refStoneMesh(black){
  var m = new THREE.Mesh(
    new THREE.SphereGeometry(CELL*0.46, 20, 14),
    new THREE.MeshStandardMaterial({color:black?0x111111:0xf5f5f5, roughness:0.3, metalness:0.1})
  );
  m.scale.y = 0.55;
  return m;
}
// 참고판 사석 제거
function _refRemoveDead(lastC, lastR, lastBlack){
  var bs=N;
  function ap(x,y){return y*bs+x;}
  var arr=new Array(bs*bs).fill(0);
  window._refStonesData.forEach(function(s){ arr[ap(s.c,s.r)]=s.b?1:2; });
  function deadGroup(x,y,color){
    var visited=new Set(), group=[], hasLib=false, stack=[[x,y]];
    while(stack.length){
      var pt=stack.pop(), k=ap(pt[0],pt[1]);
      if(visited.has(k)) continue; visited.add(k);
      var cell=arr[k];
      if(cell===0){ hasLib=true; continue; }
      if(cell!==color) continue;
      group.push(pt);
      [[1,0],[-1,0],[0,1],[0,-1]].forEach(function(d){
        var nx=pt[0]+d[0], ny=pt[1]+d[1];
        if(nx>=0&&nx<bs&&ny>=0&&ny<bs) stack.push([nx,ny]);
      });
    }
    return hasLib ? null : group;
  }
  var opp = lastBlack?2:1;
  [[1,0],[-1,0],[0,1],[0,-1]].forEach(function(d){
    var nx=lastC+d[0], ny=lastR+d[1];
    if(nx>=0&&nx<bs&&ny>=0&&ny<bs && arr[ap(nx,ny)]===opp){
      var dead=deadGroup(nx,ny,opp);
      if(dead){
        dead.forEach(function(pt){
          arr[ap(pt[0],pt[1])]=0;
          // 3D 돌 제거
          for(var i=window._refStonesData.length-1;i>=0;i--){
            var s=window._refStonesData[i];
            if(s.c===pt[0]&&s.r===pt[1]){
              window._refBoard.remove(s.mesh);
              if(s.num) window._refBoard.remove(s.num);
              window._refStonesData.splice(i,1);
            }
          }
        });
      }
    }
  });
}
window._refStonesData = [];  // [{c,r,b,mesh,num}]
function refRebuild(pos){
  // 기존 돌 제거
  window._refStonesData.forEach(function(s){ window._refBoard.remove(s.mesh); if(s.num)window._refBoard.remove(s.num); });
  window._refStonesData = [];
  window._refTurnBlack = true;

//  삽입 위치: classroom3d.html의 <script> 안, applyMove 함수 뒤
//  좌표 출처: 실제 메인 대국실(Sunjang + 19x19 + Hosun 16pt) 배치를 읽어 확정

// ---- 순장 16점 (호선) : [행, 열] 0-index ----
var SUNJANG_16 = {
    black: [[3,6], [3,12], [3,15], [9,3], [9,15], [15,3], [15,6], [15,12]],
    white: [[3,3], [3,9], [6,3], [6,15], [12,3], [12,15], [15,9], [15,15]]
};

var sunjangMode = false;          // 현재 모드 (false=보통, true=순장)
var setupStones = [];             // 초기 배치돌 (순장석) — history와 별개로 관리

// ---- 배치돌 하나 놓기 (색 지정, 3D판 + 참고도 동시) ----
function placeSetupStone(c, r, isBlack) {
    if (stones.find(function(s){ return s.c===c && s.r===r; })) return;

    // 메인 3D 바둑판
    var stone = new THREE.Mesh(
        new THREE.SphereGeometry(CELL*0.46, 20, 14),
        new THREE.MeshStandardMaterial({
            color: isBlack ? 0x111111 : 0xf5f5f5,
            roughness: 0.3, metalness: 0.1
        })
    );
    stone.scale.y = 0.55;
    stone.position.set(-BOARD/2 + c*CELL, 1.16, -BOARD/2 + r*CELL);
    stone.castShadow = true;
    scene.add(stone);

    // stones 배열에 등록 (setup 플래그로 구분)
    stones.push({ c:c, r:r, b:isBlack, mesh:stone, setup:true });
    setupStones.push({ c:c, r:r, b:isBlack, mesh:stone });

    // 참고도에도 동일하게
    if (window._refBoard) {
        var rs = new THREE.Mesh(
            new THREE.SphereGeometry(CELL*0.46, 16, 12),
            new THREE.MeshStandardMaterial({
                color: isBlack ? 0x111111 : 0xf5f5f5,
                roughness: 0.3, metalness: 0.1
            })
        );
        rs.scale.y = 0.55;
        rs.position.set(-BOARD/2 + c*CELL, 1.16, -BOARD/2 + r*CELL);
        window._refBoard.add(rs); if(window._refStones) window._refStones.push(rs);
        setupStones[setupStones.length-1].refMesh = rs;
    }
}

// ---- 순장 16점 전부 배치 ----
function placeSunjangStones() {
    SUNJANG_16.black.forEach(function(rc){ placeSetupStone(rc[1], rc[0], true); });
    SUNJANG_16.white.forEach(function(rc){ placeSetupStone(rc[1], rc[0], false); });
    turnBlack = true;   // 순장은 흑 선착
    var ti = document.getElementById('turnInfo');
    if (ti) ti.textContent = T3.black;
}

// ---- 배치돌 전부 제거 ----
function clearSetupStones() {
    setupStones.forEach(function(s){
        if (s.mesh) scene.remove(s.mesh);
        if (s.refMesh && window._refBoard) window._refBoard.remove(s.refMesh);
    });
    // stones 배열에서 setup 돌 제거
    for (var i = stones.length - 1; i >= 0; i--) {
        if (stones[i].setup) stones.splice(i, 1);
    }
    setupStones = [];
}

    if (hc >= 12 && hc <= 19) hc = hc - 10;

    gameConfig = {
        rule: isSJ ? 'sunjang' : (s.rule || 'japanese'),

        mainTime: parseInt(s.mainTime || 10),

// ============================================================
//  순장바둑 계가 엔진 + 3D 연출
//  규칙: 경계선 돌만 남기고, 안쪽 돌(흑/백 무관)은 모두 들어냄
//        점수 = 속집(빈칸) + 경계선 돌
// ============================================================

var _scoringActive = false;
var _scoreFx = [];   // 연출용 오브젝트 (정리용)

// ---- 보드 배열 만들기 ----
function _buildBoardArray() {
    var b = new Array(N * N).fill(0);   // 0=빈, 1=흑, 2=백
    stones.forEach(function (s) { b[s.r * N + s.c] = s.b ? 1 : 2; });
    return b;
}

// ---- 계가 계산 (순수 함수, 연출 없음) ----
function calcSunjangScore() {
    var board = _buildBoardArray();
    var visited = new Array(N * N).fill(false);
    var territories = [];   // {owner:1|2|0, cells:[], deadStones:[]}

    for (var i = 0; i < N * N; i++) {
        if (board[i] !== 0 || visited[i]) continue;

        // 빈칸 영역 BFS — 도중에 만나는 돌도 영역에 흡수(갇힌 돌)
        var queue = [i], cells = [], borderB = false, borderW = false;
        var inner = [];   // 이 영역 안에 갇힌 돌
        visited[i] = true;

        while (queue.length) {
            var idx = queue.pop();
            cells.push(idx);
            var x = idx % N, y = Math.floor(idx / N);

            [[1,0],[-1,0],[0,1],[0,-1]].forEach(function (d) {
                var nx = x + d[0], ny = y + d[1];
                if (nx < 0 || nx >= N || ny < 0 || ny >= N) return;
                var ni = ny * N + nx;
                if (visited[ni]) return;

                if (board[ni] === 0) {
                    visited[ni] = true;
                    queue.push(ni);
                } else {
                    // 돌을 만남 — 경계선 후보
                    if (board[ni] === 1) borderB = true;
                    else borderW = true;
                }
            });
        }

        var owner = 0;
        if (borderB && !borderW) owner = 1;        // 흑집
        else if (borderW && !borderB) owner = 2;   // 백집
        // 둘 다면 공배(0), 아무것도 없으면 빈 판

        territories.push({ owner: owner, cells: cells });
    }

    // ---- 경계선 돌 판정 ----
    // 어떤 집(owner!=0)에 인접한 같은 색 돌 = 경계선 돌
    var isBorder = new Array(N * N).fill(false);
    territories.forEach(function (t) {
        if (t.owner === 0) return;
        t.cells.forEach(function (idx) {
            var x = idx % N, y = Math.floor(idx / N);
            [[1,0],[-1,0],[0,1],[0,-1]].forEach(function (d) {
                var nx = x + d[0], ny = y + d[1];
                if (nx < 0 || nx >= N || ny < 0 || ny >= N) return;
                var ni = ny * N + nx;
                if (board[ni] === t.owner) isBorder[ni] = true;
            });
        });
    });

    // 경계선 돌은 연결된 같은 색 그룹 전체로 확장
    var expanded = isBorder.slice();
    var changed = true;
    while (changed) {
        changed = false;
        for (var j = 0; j < N * N; j++) {
            if (!expanded[j] || board[j] === 0) continue;
            var x2 = j % N, y2 = Math.floor(j / N);
            var col = board[j];
            [[1,0],[-1,0],[0,1],[0,-1]].forEach(function (d) {
                var nx = x2 + d[0], ny = y2 + d[1];
                if (nx < 0 || nx >= N || ny < 0 || ny >= N) return;
                var ni = ny * N + nx;
                if (board[ni] === col && !expanded[ni]) {
                    expanded[ni] = true;
                    changed = true;
                }
            });
        }
    }

    // ---- 결과 집계 ----
    var blackTerr = 0, whiteTerr = 0;
    var blackCells = [], whiteCells = [];
    territories.forEach(function (t) {
        if (t.owner === 1) { blackTerr += t.cells.length; blackCells = blackCells.concat(t.cells); }
        else if (t.owner === 2) { whiteTerr += t.cells.length; whiteCells = whiteCells.concat(t.cells); }
    });

    var blackBorder = 0, whiteBorder = 0;
    var deadStones = [];   // 들어낼 돌 (경계선 아닌 돌)
    stones.forEach(function (s) {
        var idx = s.r * N + s.c;
        if (expanded[idx]) {
            if (s.b) blackBorder++; else whiteBorder++;
        } else {
            deadStones.push(s);
        }
    });

    return {
        blackTerr: blackTerr,
        whiteTerr: whiteTerr,
        blackBorder: blackBorder,
        whiteBorder: whiteBorder,
        blackTotal: blackTerr + blackBorder,
        whiteTotal: whiteTerr + whiteBorder + (gameConfig ? gameConfig.komi : 0),
        blackCells: blackCells,
        whiteCells: whiteCells,
        deadStones: deadStones,
        komi: gameConfig ? gameConfig.komi : 0
    };
}

// ---- 별가루 승화 연출 ----
function _dissolveStone(s, delay) {
    setTimeout(function () {
        if (!s.mesh) return;
        var pos = s.mesh.position.clone();
        var isBlack = s.b;

        // 1) 떠오르기
        var t0 = Date.now();
        (function rise() {
            var t = (Date.now() - t0) / 400;
            if (t >= 1) { _burst(pos, isBlack); if (s.mesh) scene.remove(s.mesh); return; }
            if (s.mesh) {
                s.mesh.position.y = 1.16 + t * 0.5;
                s.mesh.rotation.y += 0.2;
                s.mesh.material.opacity = 1 - t * 0.6;
                s.mesh.material.transparent = true;
            }
            requestAnimationFrame(rise);
        })();
    }, delay);
}

// ---- 파티클 버스트 ----
function _burst(pos, isBlack) {
    var cnt = 22;
    var g = new THREE.BufferGeometry();
    var p = new Float32Array(cnt * 3);
    var vel = [];
    for (var i = 0; i < cnt; i++) {
        p[i*3] = pos.x; p[i*3+1] = pos.y + 0.5; p[i*3+2] = pos.z;
        vel.push({
            x: (Math.random()-0.5) * 0.06,
            y: Math.random() * 0.07 + 0.02,
            z: (Math.random()-0.5) * 0.06
        });
    }
    g.setAttribute('position', new THREE.BufferAttribute(p, 3));
    var m = new THREE.PointsMaterial({
        color: isBlack ? 0x9b6dff : 0x7fe8ff,
        size: 0.09, transparent: true, opacity: 1,
        blending: THREE.AdditiveBlending, depthWrite: false
    });
    var pts = new THREE.Points(g, m);
    scene.add(pts);
    _scoreFx.push(pts);

    var t0 = Date.now();
    (function fly() {
        var t = (Date.now() - t0) / 900;
        if (t >= 1) { scene.remove(pts); return; }
        var arr = g.attributes.position.array;
        for (var i = 0; i < cnt; i++) {
            arr[i*3]   += vel[i].x;
            arr[i*3+1] += vel[i].y;
            arr[i*3+2] += vel[i].z;
            vel[i].y -= 0.0012;
        }
        g.attributes.position.needsUpdate = true;
        m.opacity = 1 - t;
        requestAnimationFrame(fly);
    })();
}

// ---- 속집 홀로그램 기둥 ----
function _raisePillar(idx, isBlack, delay, num) {
    setTimeout(function () {
        var c = idx % N, r = Math.floor(idx / N);
        var col = isBlack ? 0x9b6dff : 0x7fe8ff;   // 딥퍼플 / 사이버화이트

        var geo = new THREE.BoxGeometry(CELL*0.72, 0.5, CELL*0.72);
        var mat = new THREE.MeshBasicMaterial({
            color: col, transparent: true, opacity: 0.35,
            blending: THREE.AdditiveBlending, depthWrite: false
        });
        var box = new THREE.Mesh(geo, mat);
        box.position.set(-BOARD/2 + c*CELL, 1.1, -BOARD/2 + r*CELL);
        box.scale.y = 0.01;
        scene.add(box);
        _scoreFx.push(box);

        var t0 = Date.now();
        (function grow() {
            var t = (Date.now() - t0) / 300;
            if (t >= 1) { box.scale.y = 1; box.position.y = 1.1 + 0.25; return; }
            box.scale.y = Math.max(0.01, t);
            box.position.y = 1.1 + t * 0.25;
            requestAnimationFrame(grow);
        })();
    }, delay);
}

// ---- 계가 실행 ----
function startScoring() {
    if (_scoringActive) return;
    if (!stones || stones.length === 0) {
        var b0 = document.getElementById('bubbleText');
        if (b0) b0.textContent = '먼저 바둑을 두어보세요! 계가할 돌이 없어요 📊';
        return;
    }
    _scoringActive = true;

    var res = calcSunjangScore();

    var bt = document.getElementById('bubbleText');
    if (bt) bt.textContent = '📊 계가를 시작합니다 — 경계선 안쪽 돌을 들어냅니다...';

    // 1단계: 안쪽 돌 승화 (순차적으로)
    res.deadStones.forEach(function (s, i) {
        _dissolveStone(s, i * 45);
    });

    var d1 = res.deadStones.length * 45 + 600;

    // 2단계: 속집 홀로그램
    setTimeout(function () {
        if (bt) bt.textContent = '📊 속집을 계산합니다...';
        res.blackCells.forEach(function (idx, i) { _raisePillar(idx, true, i * 22); });
        res.whiteCells.forEach(function (idx, i) { _raisePillar(idx, false, i * 22); });
    }, d1);

    var d2 = d1 + Math.max(res.blackCells.length, res.whiteCells.length) * 22 + 700;

    // 3단계: 결과 발표
    setTimeout(function () { _showScoreResult(res); }, d2);
}

// ---- 결과 패널 ----

        'min-width:300px;padding:22px;border-radius:16px;background:rgba(6,12,32,0.96);' +
        'border:2px solid ' + (bWin ? '#9b6dff' : '#7fe8ff') + ';backdrop-filter:blur(10px);' +

        '<div style="display:grid;grid-template-columns:1fr auto auto;gap:6px 14px;font-size:13px">' +
            '<span style="color:#7f9bc4"></span><b style="color:#9b6dff">흑</b><b style="color:#7fe8ff">백</b>' +
            '<span style="color:#7f9bc4">속집</span><span>' + res.blackTerr + '</span><span>' + res.whiteTerr + '</span>' +
            '<span style="color:#7f9bc4">경계선 돌</span><span>' + res.blackBorder + '</span><span>' + res.whiteBorder + '</span>' +
            (res.komi ? '<span style="color:#7f9bc4">덤</span><span>—</span><span>' + res.komi + '</span>' : '') +
        '</div>' +

        '<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(127,155,196,0.25);' +
            'display:grid;grid-template-columns:1fr auto auto;gap:14px;font-size:15px;font-weight:700">' +
            '<span style="color:#7f9bc4">합계</span>' +
            '<span style="color:#9b6dff">' + res.blackTotal.toFixed(1) + '</span>' +
            '<span style="color:#7fe8ff">' + res.whiteTotal.toFixed(1) + '</span>' +
        '</div>' +

        '<div style="margin-top:16px;display:flex;gap:8px">' +
            '<button onclick="endScoring()" style="flex:1;padding:9px;border-radius:8px;' +
                'border:1px solid rgba(127,155,196,0.4);background:rgba(127,155,196,0.1);' +
                'color:#dce8ff;font:600 12px monospace;cursor:pointer">닫기</button>' +
            '<button onclick="endScoring();buildPlanets()" style="flex:1;padding:9px;border-radius:8px;' +
                'border:1px solid #1ABC9C;background:rgba(26,188,156,0.15);' +
                'color:#1ABC9C;font:600 12px monospace;cursor:pointer">🌍 행성 만들기</button>' +
        '</div>';

    document.body.appendChild(p);

    var bt = document.getElementById('bubbleText');
    if (bt) bt.textContent = (bWin ? '흑' : '백') + '이 ' + diff.toFixed(1) + '집 차로 이겼어요! 🎉';
}

// ---- 계가 종료 (연출 정리) ----
function endScoring() {
    _scoringActive = false;
    var p = document.getElementById('scorePanel');
    if (p) p.remove();

function resetBoard3D(){ history=[]; rebuildTo(0); }
function removeDeadStones3D(lastStone){
  const bs = N;
  function ap(x,y){return y*bs+x;}
  const boardArr = new Array(bs*bs).fill(0);
  stones.forEach(s=>{ boardArr[ap(s.c,s.r)] = s.b?1:2; });
  function removeIfDead(x,y,color){
    const visited=new Set(), group=[]; let hasLib=false;
    const stack=[[x,y]];
    while(stack.length){
      const [px,py]=stack.pop();
      if(px<0||px>=bs||py<0||py>=bs) continue;
      const key=ap(px,py);
      if(visited.has(key)) continue;
      visited.add(key);
      const cell=boardArr[key];
      if(cell===0){ hasLib=true; continue; }
      if(cell!==color) continue;
      group.push([px,py]);
      stack.push([px+1,py],[px-1,py],[px,py+1],[px,py-1]);
    }
    if(!hasLib){
      const removeSet=new Set(group.map(p=>p[0]+','+p[1]));
      // 3D 메시 제거
      stones.forEach(s=>{ if(removeSet.has(s.c+','+s.r) && s.mesh) scene.remove(s.mesh); });
      stones = stones.filter(s=>!removeSet.has(s.c+','+s.r));
      group.forEach(p=>{ boardArr[ap(p[0],p[1])]=0; });
    }
    return !hasLib;
  }
  const myColor = lastStone.b?1:2, opp = myColor===1?2:1;
  [[1,0],[-1,0],[0,1],[0,-1]].forEach(d=>{
    const nx=lastStone.c+d[0], ny=lastStone.r+d[1];
    if(nx>=0&&nx<bs&&ny>=0&&ny<bs&&boardArr[ap(nx,ny)]===opp) removeIfDead(nx,ny,opp);
  });
}
const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();
const COLS = 'ABCDEFGHJKLMNOPQRST';

renderer.domElement.addEventListener('click', e=>{
  if(window._moved){ window._moved=false; return; }  // 드래그였으면 착수 안 함
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hit = raycaster.intersectObject(boardMesh);
  if(!hit.length) return;
  const p = hit[0].point;
  const c = Math.round((p.x + BOARD/2)/CELL);
  const r = Math.round((p.z + BOARD/2)/CELL);
  if(c<0||c>=N||r<0||r>=N) return;
  if(stones.find(s=>s.c===c&&s.r===r)) return;
  applyMove(c, r);
  if(window.c3dSendMove) window.c3dSendMove(c, r);
});
// === 착수 적용 (로컬 클릭 / 네트워크 수신 / 입장 동기화 공용) ===
function applyMove(c, r, quiet){
  // 중복 착수 방지 (click 이벤트 중복 발생 대응)
  var _now = Date.now();
  if(!quiet){
    if(window._lastMoveTime && (_now - window._lastMoveTime) < 250){ return; }
    window._lastMoveTime = _now;
  }
  if(stones.find(s=>s.c===c&&s.r===r)) return;
  const stone = new THREE.Mesh(
    new THREE.SphereGeometry(CELL*0.46, 20, 14),
    new THREE.MeshStandardMaterial({color: turnBlack?0x111111:0xf5f5f5, roughness:0.3, metalness:0.1})
  );
  stone.scale.y = 0.55;
  stone.position.set(-BOARD/2+c*CELL, 1.16, -BOARD/2+r*CELL);
  stone.castShadow = true;
  scene.add(stone);
  stones.push({c, r, b:turnBlack, mesh:stone});
  history = history.slice(0, histPos);
  history.push({c, r, b:turnBlack});
  histPos = history.length;
  removeDeadStones3D({c, r, b:turnBlack});
  const coord = COLS[c] + (N - r);
  const isBlack = turnBlack;
  turnBlack = !turnBlack;
  document.getElementById('turnInfo').textContent = turnBlack ? T3.black : T3.white;
  if(quiet) return;
  // 강의 중복 요청 방지 (click 이벤트 중복 대응 - 과거 해결 패턴)
  if(window._lectureInProgress) return;
  window._lectureInProgress = true;
  fetch('/api/lecture?lang='+C3D_LANG+'&playerTPI=500&lastMove='+coord+'&turn='+(isBlack?0:1)+'&winrate=0.5&boardsize=19')
    .then(r=>r.json())
    .then(d=>{
      const txt = (d.comment||d.text||d.message||'').replace(/[*#]/g,'');
      if(txt) teacherSpeak(txt);
      window._lectureInProgress = false;
    }).catch(()=>{ window._lectureInProgress = false; });
}

    sgf += 'DT[' + new Date().toISOString().slice(0,10) + ']';
    sgf += 'PC[Tobmate 3D 우주 바둑 교실]';
    for(var i=0;i<history.length;i++){
        var m = history[i];
        var col = m.b ? 'B' : 'W';
        var x = String.fromCharCode(97 + m.c);  // a=0,b=1...
        var y = String.fromCharCode(97 + m.r);
        sgf += ';' + col + '[' + x + y + ']';
    }
    sgf += ')';
    // 다운로드
    try {
        var blob = new Blob([sgf], {type:'application/x-go-sgf'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        var ts = new Date();
        var fname = 'tobmate_space_go_' + ts.getFullYear() +
            ('0'+(ts.getMonth()+1)).slice(-2) + ('0'+ts.getDate()).slice(-2) +
            '_' + ('0'+ts.getHours()).slice(-2) + ('0'+ts.getMinutes()).slice(-2) + '.sgf';
        a.href = url; a.download = fname;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        // 저장 완료 안내 (AI 선생님 말풍선 활용)
        var bt = document.getElementById('bubbleText');
        if(bt) bt.textContent = '🌌 우주에서 둔 바둑 ' + history.length + '수를 기보로 저장했어요! (' + fname + ')';
    } catch(err){
        alert('저장 실패: ' + err.message);
    }
}
window.exportSGF = exportSGF;


// ===== 우주 바둑: 영역 → 행성 조립 =====
function buildPlanets(){
    if(!stones || stones.length===0){
        var bt0=document.getElementById('bubbleText');
        if(bt0) bt0.textContent='먼저 바둑을 두어보세요! 돌을 놓으면 행성을 만들 수 있어요 🌍';
        return;
    }
    // 보드 배열 (0=빈칸, 1=흑, 2=백)
    var board = new Array(N*N).fill(0);
    stones.forEach(function(s){ board[s.r*N + s.c] = s.b ? 1 : 2; });

    // floodFill로 빈 영역이 어느 색에 둘러싸였나 판정
    var visited = new Array(N*N).fill(false);
    var blackTerr=0, whiteTerr=0;
    for(var i=0;i<N*N;i++){
        if(board[i]!==0 || visited[i]) continue;
        // 빈 칸 그룹 BFS
        var queue=[i], group=[], borderB=false, borderW=false;
        visited[i]=true;
        while(queue.length){
            var idx=queue.pop(); group.push(idx);
            var x=idx%N, y=Math.floor(idx/N);
            [[1,0],[-1,0],[0,1],[0,-1]].forEach(function(d){
                var nx=x+d[0], ny=y+d[1];
                if(nx<0||nx>=N||ny<0||ny>=N) return;
                var ni=ny*N+nx;
                if(board[ni]===1) borderB=true;
                else if(board[ni]===2) borderW=true;
                else if(!visited[ni]){ visited[ni]=true; queue.push(ni); }
            });
        }
        // 한 색에만 둘러싸이면 그 색 영역
        if(borderB && !borderW) blackTerr += group.length;
        else if(borderW && !borderB) whiteTerr += group.length;
    }
    // 돌 수도 영역에 포함
    var blackStones=0, whiteStones=0;
    stones.forEach(function(s){ if(s.b) blackStones++; else whiteStones++; });
    var blackTotal = blackTerr + blackStones;
    var whiteTotal = whiteTerr + whiteStones;

    // 기존 행성 제거
    if(window._resultPlanets){ window._resultPlanets.forEach(function(p){ scene.remove(p); }); }
    window._resultPlanets = [];

    // 행성 조립 (크기 = 영역, 최소 반지름 보장)
    function makePlanet(size, color, xPos){
        var r = Math.max(1.2, Math.min(4, 0.8 + size*0.05));
        var geo = new THREE.SphereGeometry(r, 32, 32);
        var mat = new THREE.MeshStandardMaterial({color:color, roughness:0.6, metalness:0.2, emissive:color, emissiveIntensity:0.15});
        var planet = new THREE.Mesh(geo, mat);
        planet.position.set(xPos, 6, -3);
        // 발광 외곽
        var glow = new THREE.Mesh(new THREE.SphereGeometry(r*1.2,20,20), new THREE.MeshBasicMaterial({color:color, transparent:true, opacity:0.2}));
        planet.add(glow);
        scene.add(planet);
        window._resultPlanets.push(planet);
        return planet;
    }
    var blackPlanet = makePlanet(blackTotal, 0x2266dd, -4);  // 파란 바다행성
    var whitePlanet = makePlanet(whiteTotal, 0x22aa44, 4);   // 초록 대륙행성

    // 행성 회전 애니메이션 등록
    if(!window._planetSpin){
        window._planetSpin = true;
        (function spin(){
            requestAnimationFrame(spin);
            if(window._resultPlanets){ window._resultPlanets.forEach(function(p){ p.rotation.y += 0.01; }); }
        })();
    }

    // AI 선생님 축하
    var bt=document.getElementById('bubbleText');
    if(bt){
        var winner = blackTotal>whiteTotal ? '🌊 파란 바다행성(흑)' : '🌿 초록 대륙행성(백)';
        bt.textContent = '🌍 행성 완성! 파란행성 '+blackTotal+' · 초록행성 '+whiteTotal+' · '+winner+'이 더 커요! 멋진 우주를 만들었어요! ✨';
    }
    if(typeof teacherSpeak==='function'){
        teacherSpeak('멋진 행성을 만들었어요! 파란 행성은 '+blackTotal+', 초록 행성은 '+whiteTotal+' 크기예요.');
    }
    // 내 은하계(G1)에 행성 저장 (localStorage)
    saveToGalaxy(blackTotal, whiteTotal);
}
function saveToGalaxy(blackTotal, whiteTotal){
    try {
        var qs = new URLSearchParams(location.search);
        var user = qs.get('user') || 'guest';
        var key = 'tobmate_galaxy_' + user;
        var galaxy = [];
        try { var raw = localStorage.getItem(key); if(raw) galaxy = JSON.parse(raw); } catch(e){}
        var winner = blackTotal > whiteTotal;
        // 더 큰 행성을 대표 행성으로 저장
        var myTotal = Math.max(blackTotal, whiteTotal);
        var sgf = '';
        try { if(typeof history!=='undefined' && history.length){
            sgf = '(;GM[1]FF[4]SZ[19]';
            for(var i=0;i<history.length;i++){ var m=history[i]; sgf += ';'+(m.b?'B':'W')+'['+String.fromCharCode(97+m.c)+String.fromCharCode(97+m.r)+']'; }
            sgf += ')';
        }} catch(e){}
        galaxy.push({
            name: winner ? '🌊 바다행성' : '🌿 대륙행성',
            size: myTotal,
            territory: myTotal,
            winner: winner,
            color: winner ? '#2266dd' : '#22aa44',
            date: new Date().toISOString().slice(0,10),
            moves: (typeof history!=='undefined') ? history.length : 0,
            sgf: sgf
        });
        localStorage.setItem(key, JSON.stringify(galaxy));
        // 안내
        setTimeout(function(){
            var bt=document.getElementById('bubbleText');
            if(bt) bt.textContent = '🌌 이 행성이 내 은하계(G1)에 저장됐어요! 지금까지 만든 행성: '+galaxy.length+'개';
        }, 3000);
    } catch(err){ console.warn('은하계 저장 실패:', err); }
}
window.buildPlanets = buildPlanets;

</script>
