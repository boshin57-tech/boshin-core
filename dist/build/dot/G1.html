<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>내 은하계 — Tobmate</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#01030c;
  font-family:'D2Coding','Consolas',monospace;color:#cfe3ff;-webkit-tap-highlight-color:transparent}
canvas{display:block}
#hud{position:fixed;top:0;left:0;right:0;padding:16px 20px;display:flex;
  justify-content:space-between;align-items:center;z-index:10;pointer-events:none}
#title{font-size:15px;font-weight:bold;letter-spacing:1px;
  background:linear-gradient(90deg,#7fd4ff,#c8a2ff,#ff9dd4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#stats{display:flex;gap:16px;font-size:12px;color:#5f7fa8}
#stats b{color:#7fd4ff;font-weight:bold;margin-left:4px}
#stats .w{color:#ffd76b}
#stats .t{color:#ff9dd4}
#back{position:fixed;top:52px;left:20px;z-index:10;
  background:rgba(8,16,36,0.85);border:1px solid rgba(127,212,255,0.3);
  color:#7fd4ff;padding:7px 14px;border-radius:20px;font:12px monospace;
  cursor:pointer;backdrop-filter:blur(8px);transition:.2s}
#back:hover{background:rgba(127,212,255,0.15);border-color:#7fd4ff}
#tip{position:fixed;bottom:14px;left:0;right:0;text-align:center;
  font-size:11px;color:#3d5578;z-index:10;pointer-events:none}
#card{position:fixed;right:20px;top:50%;transform:translateY(-50%) translateX(30px);
  width:290px;background:rgba(6,12,28,0.94);border:1px solid rgba(127,212,255,0.28);
  border-radius:14px;padding:18px;z-index:20;opacity:0;pointer-events:none;
  transition:.25s;backdrop-filter:blur(12px);box-shadow:0 8px 40px rgba(0,0,0,.6)}
#card.on{opacity:1;pointer-events:auto;transform:translateY(-50%) translateX(0)}
#card .nm{font-size:15px;font-weight:bold;margin-bottom:3px;color:#e8f2ff}
#card .dt{font-size:10px;color:#4d6a94;margin-bottom:14px}
.vs{display:flex;align-items:center;gap:8px;margin-bottom:14px;
  background:rgba(127,212,255,0.05);border-radius:10px;padding:10px}
.vs .p{flex:1;text-align:center}
.vs .p .u{font-size:12px;font-weight:bold;margin-bottom:3px;color:#a8b8d0}
.vs .p .s{font-size:19px;font-weight:bold}
.vs .p.b .s{color:#c8a2ff}
.vs .p.w .s{color:#7fe8ff}
.vs .x{font-size:10px;color:#3d5578}
.row{display:flex;justify-content:space-between;font-size:11px;
  padding:5px 0;border-top:1px solid rgba(127,212,255,0.08)}
.row span:first-child{color:#4d6a94}
.row span:last-child{color:#b8ccea}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:12px}
.bg{font-size:10px;padding:3px 8px;border-radius:10px;
  background:rgba(200,162,255,0.12);border:1px solid rgba(200,162,255,0.3);color:#c8a2ff}
.bg.tr{background:rgba(255,204,68,0.14);border-color:rgba(255,204,68,0.4);color:#ffcc44}
#card .cls{position:absolute;top:12px;right:14px;color:#3d5578;cursor:pointer;font-size:16px}
#card .cls:hover{color:#7fd4ff}
#empty{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;z-index:5;display:none}
#empty .e1{font-size:34px;margin-bottom:14px;opacity:.5}
#empty .e2{font-size:14px;color:#5f7fa8;margin-bottom:6px}
#empty .e3{font-size:11px;color:#3d5578;line-height:1.7}
@media(max-width:600px){#card{right:10px;left:10px;width:auto}#stats{gap:10px;font-size:11px}}
</style>
</head>
<body>
<div id="hud">
  <div id="title">🌌 내 은하계</div>
  <div id="stats">
    <div>행성<b id="sP">0</b></div>
    <div>승리<b class="w" id="sW">0</b></div>
    <div>영토<b class="t" id="sT">0</b></div>
    <div>위성<b id="sM">0</b></div>
  </div>
</div>
<button id="back" onclick="history.back()">← 우주 지도로</button>
<div id="empty">
  <div class="e1">✨</div>
  <div class="e2">아직 별이 없어요</div>
  <div class="e3">3D 바둑 교실에서 <b>친구와 함께</b> 한 판 두면<br>새로운 별이 태어나요</div>
</div>
<div id="card">
  <div class="cls" onclick="closeCard()">×</div>
  <div class="nm" id="cN">—</div>
  <div class="dt" id="cD">—</div>
  <div class="vs">
    <div class="p b"><div class="u" id="cBU">—</div><div class="s" id="cBS">0</div></div>
    <div class="x">VS</div>
    <div class="p w"><div class="u" id="cWU">—</div><div class="s" id="cWS">0</div></div>
  </div>
  <div class="row"><span>승자</span><span id="cWin">—</span></div>
  <div class="row"><span>수순</span><span id="cMv">—</span></div>
  <div class="row"><span>덤</span><span id="cKo">—</span></div>
  <div class="row"><span>크기</span><span id="cSz">—</span></div>
  <div class="badges" id="cBadge"></div>
</div>
<div id="tip">드래그 회전 · 휠 확대 · 행성 클릭</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/dot/avatar.js?v=1783849256"></script>
<script src="/dot/galaxy.js"></script>
<script>
(function(){
'use strict';

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 400);
var renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* 별 배경 — Points 1 드로우콜 */
(function(){
  var N = 2600, pos = new Float32Array(N*3), sz = new Float32Array(N);
  for (var i=0;i<N;i++){
    var r = 90 + Math.random()*180, t = Math.random()*Math.PI*2, p = Math.acos(2*Math.random()-1);
    pos[i*3]   = r*Math.sin(p)*Math.cos(t);
    pos[i*3+1] = r*Math.cos(p)*0.5;
    pos[i*3+2] = r*Math.sin(p)*Math.sin(t);
    sz[i] = Math.random();
  }
  var g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('aSeed', new THREE.BufferAttribute(sz,1));
  var m = new THREE.ShaderMaterial({
    uniforms:{ uT:{value:0} },
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
    vertexShader:
      'attribute float aSeed; varying float vS;'+
      'void main(){ vS=aSeed;'+
      ' vec4 mv=modelViewMatrix*vec4(position,1.0);'+
      ' gl_PointSize=(0.6+aSeed*1.9)*(200.0/-mv.z);'+
      ' gl_Position=projectionMatrix*mv; }',
    fragmentShader:
      'varying float vS; uniform float uT;'+
      'void main(){ vec2 c=gl_PointCoord-0.5; float d=length(c);'+
      ' if(d>0.5) discard;'+
      ' float tw=0.55+0.45*sin(uT*1.6+vS*40.0);'+
      ' float a=(1.0-d*2.0)*tw*0.85;'+
      ' vec3 col=mix(vec3(0.62,0.78,1.0), vec3(1.0,0.92,0.78), vS);'+
      ' gl_FragColor=vec4(col,a); }'
  });
  scene.add(new THREE.Points(g,m));
  window._stars = m;
})();

/* 배경 바이오 성운 — Plane 3장, 비용 거의 0 */
(function(){
  var NVS='varying vec2 vUv; void main(){ vUv=uv;'+
    ' gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }';
  var NFS='varying vec2 vUv; uniform float uT; uniform vec3 uA; uniform vec3 uB; uniform float uSeed;'+
    'float h(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5); }'+
    'float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);'+
    ' return mix(mix(h(i),h(i+vec2(1.0,0.0)),f.x),mix(h(i+vec2(0.0,1.0)),h(i+vec2(1.0,1.0)),f.x),f.y); }'+
    'float fbm(vec2 p){ float v=0.0,a=0.5;'+
    ' for(int i=0;i<5;i++){ v+=a*n(p); p*=2.0; a*=0.5; } return v; }'+
    'void main(){'+
    ' vec2 uv=vUv*3.0+uSeed*7.0;'+
    ' float f=fbm(uv+vec2(uT*0.012,uT*0.008));'+
    ' f=fbm(uv+f*1.5+vec2(uT*0.02,0.0));'+
    ' float pulse=0.75+0.25*sin(uT*0.5+uSeed*6.0);'+
    ' vec3 col=mix(uA,uB,f);'+
    ' float d=distance(vUv,vec2(0.5));'+
    ' float mask=smoothstep(0.5,0.12,d);'+
    ' gl_FragColor=vec4(col, f*mask*0.34*pulse); }';

  var sets=[
    { c1:new THREE.Color(0x3ad6a0), c2:new THREE.Color(0x7f5fff), z:-60, s:170, seed:0.1 },
    { c1:new THREE.Color(0xff7fd0), c2:new THREE.Color(0x5fa8ff), z:-90, s:220, seed:0.6 },
    { c1:new THREE.Color(0x9fffe0), c2:new THREE.Color(0xc8a2ff), z:-40, s:130, seed:0.9 }
  ];
  window._nebulas=[];
  sets.forEach(function(o){
    var m=new THREE.ShaderMaterial({
      uniforms:{ uT:{value:0}, uA:{value:o.c1}, uB:{value:o.c2}, uSeed:{value:o.seed} },
      vertexShader:NVS, fragmentShader:NFS,
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
      side:THREE.DoubleSide
    });
    var pl=new THREE.Mesh(new THREE.PlaneGeometry(o.s,o.s), m);
    pl.position.set((Math.random()-0.5)*40, (Math.random()-0.5)*30, o.z);
    pl.rotation.z=Math.random()*Math.PI;
    scene.add(pl);
    window._nebulas.push(m);
  });
})();

/* 은하 코어 */
var core = new THREE.Mesh(
  new THREE.SphereGeometry(2.1, 32, 24),
  new THREE.ShaderMaterial({
    uniforms:{ uT:{value:0} },
    vertexShader:'varying vec3 vN; varying vec3 vP;'+
      'void main(){ vN=normalize(normalMatrix*normal);'+
      ' vec4 mv=modelViewMatrix*vec4(position,1.0); vP=mv.xyz;'+
      ' gl_Position=projectionMatrix*mv; }',
    fragmentShader:'varying vec3 vN; varying vec3 vP; uniform float uT;'+
      'void main(){ float f=pow(1.0-abs(dot(normalize(-vP),vN)),1.6);'+
      ' float pulse=0.86+0.14*sin(uT*1.1);'+
      ' vec3 c=mix(vec3(1.0,0.86,0.35), vec3(1.0,0.55,0.2), f)*pulse;'+
      ' gl_FragColor=vec4(c, 0.95); }'
  })
);
scene.add(core);

var glow = new THREE.Mesh(
  new THREE.SphereGeometry(3.3, 24, 18),
  new THREE.ShaderMaterial({
    uniforms:{ uT:{value:0} }, transparent:true, side:THREE.BackSide,
    depthWrite:false, blending:THREE.AdditiveBlending,
    vertexShader:'varying vec3 vN; varying vec3 vP;'+
      'void main(){ vN=normalize(normalMatrix*normal);'+
      ' vec4 mv=modelViewMatrix*vec4(position,1.0); vP=mv.xyz;'+
      ' gl_Position=projectionMatrix*mv; }',
    fragmentShader:'varying vec3 vN; varying vec3 vP; uniform float uT;'+
      'void main(){ float f=pow(1.0-abs(dot(normalize(-vP),vN)),2.6);'+
      ' float p=0.7+0.3*sin(uT*0.9);'+
      ' gl_FragColor=vec4(1.0,0.72,0.28, f*0.42*p); }'
  })
);
scene.add(glow);

/* 행성 셰이더 */
var PVS =
  'varying vec2 vUv; varying vec3 vN; varying vec3 vP;'+
  'void main(){ vUv=uv; vN=normalize(normalMatrix*normal);'+
  ' vec4 mv=modelViewMatrix*vec4(position,1.0); vP=mv.xyz;'+
  ' gl_Position=projectionMatrix*mv; }';

var PFS =
  'varying vec2 vUv; varying vec3 vN; varying vec3 vP;'+
  'uniform float uT; uniform float uRainbow; uniform float uAge;'+
  'uniform float uWon; uniform vec3 uTint; uniform float uSeed;'+
  'float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5); }'+
  'float noise(vec2 p){ vec2 i=floor(p), f=fract(p); f=f*f*(3.0-2.0*f);'+
  ' return mix(mix(hash(i),hash(i+vec2(1.0,0.0)),f.x),'+
  '            mix(hash(i+vec2(0.0,1.0)),hash(i+vec2(1.0,1.0)),f.x), f.y); }'+
  'float fbm(vec2 p){ float v=0.0; float a=0.5;'+
  ' for(int i=0;i<4;i++){ v+=a*noise(p); p*=2.1; a*=0.5; } return v; }'+
  'vec3 rainbow(float t){ return 0.55+0.45*cos(6.2831*(t+vec3(0.0,0.33,0.67))); }'+
  'void main(){'+
  ' float n=fbm(vUv*7.0 + uSeed*13.0 + uT*0.035);'+
  ' vec3 base;'+
  ' if(uRainbow>0.5){ base = rainbow(vUv.y*0.75 + n*0.35 + uT*0.045 + uSeed); }'+
  ' else { base = mix(uTint*0.42, uTint, n); }'+
  ' base = mix(base, base*0.72, uAge*0.35);'+
  ' vec3 L=normalize(vec3(0.55,0.7,0.75));'+
  ' float dif=max(dot(vN,L),0.0);'+
  ' float shade=mix(0.18, 1.0, dif);'+
  ' shade=mix(shade*0.7, shade, uWon);'+
  ' float fres=pow(1.0-abs(dot(normalize(-vP),vN)),2.3);'+
  ' vec3 rim=(uRainbow>0.5)? rainbow(uT*0.1+uSeed) : uTint;'+
  ' vec3 col=base*shade + rim*fres*0.85 + rim*0.1;'+
  ' gl_FragColor=vec4(col,1.0); }';

var sphereGeo = new THREE.SphereGeometry(1, 28, 20);

function orbitRing(r){
  var pts=[], N=128;
  for (var i=0;i<=N;i++){ var a=i/N*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*r, 0, Math.sin(a)*r)); }
  return new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0x2a4a7a, transparent:true, opacity:0.28}));
}

/* 별똥별 */
var METEOR_MAX = 40;
var meteorPos = new Float32Array(METEOR_MAX*3);
var meteorLife = new Float32Array(METEOR_MAX);
var meteorCol = new Float32Array(METEOR_MAX*3);
var meteorVel = [];
for (var mi=0; mi<METEOR_MAX; mi++){ meteorLife[mi]=0; meteorVel.push({x:0,y:0,z:0}); }

var mGeo = new THREE.BufferGeometry();
mGeo.setAttribute('position', new THREE.BufferAttribute(meteorPos,3));
mGeo.setAttribute('aLife', new THREE.BufferAttribute(meteorLife,1));
mGeo.setAttribute('aCol', new THREE.BufferAttribute(meteorCol,3));
var mMat = new THREE.ShaderMaterial({
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
  vertexShader:'attribute float aLife; attribute vec3 aCol;'+
    'varying float vL; varying vec3 vC;'+
    'void main(){ vL=aLife; vC=aCol;'+
    ' vec4 mv=modelViewMatrix*vec4(position,1.0);'+
    ' gl_PointSize=(aLife>0.0? 8.0*aLife : 0.0)*(120.0/-mv.z);'+
    ' gl_Position=projectionMatrix*mv; }',
  fragmentShader:'varying float vL; varying vec3 vC;'+
    'void main(){ if(vL<=0.0) discard;'+
    ' vec2 c=gl_PointCoord-0.5; float d=length(c); if(d>0.5) discard;'+
    ' gl_FragColor=vec4(vC, (1.0-d*2.0)*vL); }'
});
scene.add(new THREE.Points(mGeo, mMat));

function spawnMeteor(color, target){
  for (var i=0;i<METEOR_MAX;i++){
    if (meteorLife[i] <= 0){
      var a = Math.random()*Math.PI*2, r = 45 + Math.random()*30;
      meteorPos[i*3]   = Math.cos(a)*r;
      meteorPos[i*3+1] = 18 + Math.random()*22;
      meteorPos[i*3+2] = Math.sin(a)*r;
      var tx = target ? target.x : (Math.random()-0.5)*40;
      var ty = target ? target.y : -8;
      var tz = target ? target.z : (Math.random()-0.5)*40;
      var d = 0.012 + Math.random()*0.01;
      meteorVel[i] = { x:(tx-meteorPos[i*3])*d,
                       y:(ty-meteorPos[i*3+1])*d,
                       z:(tz-meteorPos[i*3+2])*d };
      var c = new THREE.Color(color || 0x9fd8ff);
      meteorCol[i*3]=c.r; meteorCol[i*3+1]=c.g; meteorCol[i*3+2]=c.b;
      meteorLife[i] = 1;
      return;
    }
  }
}

/* 우주 정원 — 성운 꽃 (모든 행성 통합, 드로우콜 1) */
var FLORA_MAX = 4000;
var flPos  = new Float32Array(FLORA_MAX*3);
var flCol  = new Float32Array(FLORA_MAX*3);
var flSeed = new Float32Array(FLORA_MAX);
var flSize = new Float32Array(FLORA_MAX);
var flOwner = [];              // 어느 행성에 붙은 꽃인지
var flLocal = [];              // 행성 로컬 좌표
var flCount = 0;

var flGeo = new THREE.BufferGeometry();
flGeo.setAttribute('position', new THREE.BufferAttribute(flPos,3));
flGeo.setAttribute('aCol',  new THREE.BufferAttribute(flCol,3));
flGeo.setAttribute('aSeed', new THREE.BufferAttribute(flSeed,1));
flGeo.setAttribute('aSize', new THREE.BufferAttribute(flSize,1));

var flMat = new THREE.ShaderMaterial({
  uniforms:{ uT:{value:0} },
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
  vertexShader:
    'attribute vec3 aCol; attribute float aSeed; attribute float aSize;'+
    'varying vec3 vC; varying float vS;'+
    'uniform float uT;'+
    'void main(){ vC=aCol; vS=aSeed;'+
    ' vec3 p=position;'+
    ' p.y += sin(uT*0.9 + aSeed*20.0)*0.035;'+        // 흔들림
    ' vec4 mv=modelViewMatrix*vec4(p,1.0);'+
    ' float bloom=0.75+0.25*sin(uT*1.4+aSeed*30.0);'+ // 개화 맥동
    ' gl_PointSize=aSize*bloom*(150.0/-mv.z);'+
    ' gl_Position=projectionMatrix*mv; }',
  fragmentShader:
    'varying vec3 vC; varying float vS; uniform float uT;'+
    'void main(){ vec2 c=gl_PointCoord-0.5; float d=length(c);'+
    ' if(d>0.5) discard;'+
    // 꽃잎 4장 (십자 형태로 부드럽게)
    ' float a=atan(c.y,c.x);'+
    ' float petal=0.55+0.45*abs(cos(a*2.0+vS*6.28));'+
    ' float m=smoothstep(petal*0.5, 0.0, d);'+
    ' float glow=0.65+0.35*sin(uT*1.6+vS*25.0);'+
    ' gl_FragColor=vec4(vC*glow, m*0.9); }'
});
scene.add(new THREE.Points(flGeo, flMat));

function resetFlora(){
  flCount=0; flOwner=[]; flLocal=[];
  for (var i=0;i<FLORA_MAX;i++){ flSize[i]=0; }
}

// 그 판의 속집(빈칸)에서 꽃이 핀다 — 바둑판이 곧 화단
function plantFlora(pIdx, d, radius){
  // 개화량: 수순(치열함) + 승리 + 영토
  var moves = d.moves || 0;
  var n = Math.floor(
    34 + Math.min(moves, 300) * 0.16 + (d.iWon ? 16 : 0) + Math.min((d.size||0)/14, 18)
  );
  n = Math.min(n, 110);

  var palA = d.iWon ? [0.35,1.0,0.62] : [0.55,0.85,1.0];   // 승: 에메랄드 / 패: 아이스블루
  var palB = d.iWon ? [1.0,0.82,0.35] : [0.85,0.62,1.0];   // 승: 골드 / 패: 라벤더

  for (var i=0;i<n && flCount<FLORA_MAX;i++){
    var k = i/n;
    // 나선형 덩굴 — 행성 표면에서 감아 올라감
    var th = k * Math.PI * 7.5 + pIdx * 1.3;
    var rr = radius * (1.12 + Math.sin(k*Math.PI)*0.42);
    var yy = Math.cos(k * Math.PI) * radius * 1.25;

    flLocal.push({
      x: Math.cos(th)*rr,
      y: yy,
      z: Math.sin(th)*rr
    });
    flOwner.push(pIdx);

    var mix = k*0.7 + Math.random()*0.3;
    flCol[flCount*3]   = palA[0]*(1-mix) + palB[0]*mix;
    flCol[flCount*3+1] = palA[1]*(1-mix) + palB[1]*mix;
    flCol[flCount*3+2] = palA[2]*(1-mix) + palB[2]*mix;

    flSeed[flCount] = Math.random();
    // 끝으로 갈수록 큰 꽃 (장명국일수록 활짝)
    flSize[flCount] = (1.6 + k*3.4) * (moves > 200 ? 1.45 : 1.0);
    flCount++;
  }
}

function syncFlora(){
  for (var i=0;i<flCount;i++){
    var p = planets[flOwner[i]];
    if (!p) continue;
    var L = flLocal[i];
    flPos[i*3]   = p.grp.position.x + L.x;
    flPos[i*3+1] = p.grp.position.y + L.y;
    flPos[i*3+2] = p.grp.position.z + L.z;
  }
  flGeo.attributes.position.needsUpdate = true;
  flGeo.attributes.aCol.needsUpdate = true;
  flGeo.attributes.aSeed.needsUpdate = true;
  flGeo.attributes.aSize.needsUpdate = true;
  flGeo.setDrawRange(0, flCount);
}

/* 행성 빌드 */
var planets = [], clickables = [];

function build(){
  planets.forEach(function(p){ scene.remove(p.grp); });
  planets = []; clickables = []; resetFlora();

  var G = window.Galaxy ? Galaxy.load() : [];
  document.getElementById('empty').style.display = G.length ? 'none' : 'block';

  var st = window.Galaxy ? Galaxy.stats() : {planets:0,wins:0,territory:0,moons:0,age:1};
  document.getElementById('sP').textContent = st.planets;
  document.getElementById('sW').textContent = st.wins;
  document.getElementById('sT').textContent = st.territory;
  document.getElementById('sM').textContent = st.moons;

  var ageMax = Math.max(st.age || 1, 1);

  G.forEach(function(d, i){
    var grp = new THREE.Group();
    var size = Math.max(0.28, Math.min(2.6, 0.3 + (d.size||d.baseSize||10)/75));
    var orbitR = 6 + Math.min(i*2.2, 34) + (i%2)*0.9 + (i>15 ? (i%4)*1.2 : 0);
    var speed = 0.16/Math.sqrt(orbitR) * (i%2 ? 1 : -1);
    var ageN = Math.min(((Date.now()-new Date(d.date))/86400000)/ageMax, 1) || 0;
    var tint = new THREE.Color(d.iWon ? 0x4a9eff : 0x22cc88);

    var mat = new THREE.ShaderMaterial({
      uniforms:{ uT:{value:0}, uRainbow:{value:d.rainbow?1:0}, uAge:{value:ageN},
                 uWon:{value:d.iWon?1:0}, uTint:{value:tint}, uSeed:{value:(i*0.37)%1} },
      vertexShader: PVS, fragmentShader: PFS
    });

    var mesh = new THREE.Mesh(sphereGeo, mat);
    mesh.scale.setScalar(size);
    mesh.userData = { data:d, idx:i };
    grp.add(mesh);
    clickables.push(mesh);

    (d.rings||[]).forEach(function(rg){
      var ring = new THREE.Mesh(
        new THREE.RingGeometry(size*1.5, size*(1.5+(rg.width||0.3)), 48),
        new THREE.MeshBasicMaterial({
          color:new THREE.Color(rg.palette ? rg.palette[0] : '#c8a2ff'),
          transparent:true, opacity:0.42, side:THREE.DoubleSide, depthWrite:false }));
      ring.rotation.x = Math.PI/2 + (rg.tilt||0.4);
      grp.add(ring);
    });

    var moons = [];
    (d.moons||[]).forEach(function(mn, k){
      var bc = new THREE.Color(mn.color||'#ff9dd4');
      // 나비 몸통 + 날개 (Points, 셰이더로 팔랑거림)
      var NW = 26, wp = new Float32Array(NW*3), ws = new Float32Array(NW);
      for (var w=0; w<NW; w++){
        var side = (w % 2 === 0) ? 1 : -1;
        var t2 = Math.floor(w/2)/(NW/2);
        wp[w*3]   = side * t2 * size*0.28;
        wp[w*3+1] = Math.sin(t2*Math.PI) * size*0.16;
        wp[w*3+2] = (Math.random()-0.5) * size*0.05;
        ws[w] = t2;
      }
      var wg = new THREE.BufferGeometry();
      wg.setAttribute('position', new THREE.BufferAttribute(wp,3));
      wg.setAttribute('aW', new THREE.BufferAttribute(ws,1));
      var wm = new THREE.ShaderMaterial({
        uniforms:{ uT:{value:0}, uC:{value:bc} },
        transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
        vertexShader:
          'attribute float aW; varying float vW; uniform float uT;'+
          'void main(){ vW=aW;'+
          ' vec3 p=position;'+
          ' float flap=sin(uT*7.0)*0.5;'+          // 날갯짓
          ' p.y += abs(p.x)*flap;'+
          ' p.x *= 0.75+0.25*cos(uT*7.0);'+
          ' vec4 mv=modelViewMatrix*vec4(p,1.0);'+
          ' gl_PointSize=(5.5-aW*2.5)*(140.0/-mv.z);'+
          ' gl_Position=projectionMatrix*mv; }',
        fragmentShader:
          'varying float vW; uniform vec3 uC; uniform float uT;'+
          'void main(){ vec2 c=gl_PointCoord-0.5; float d=length(c);'+
          ' if(d>0.5) discard;'+
          ' float g=0.7+0.3*sin(uT*3.0+vW*10.0);'+
          ' gl_FragColor=vec4(uC*g, (1.0-d*2.0)*(0.95-vW*0.45)); }'
      });
      var bfly = new THREE.Points(wg, wm);
      grp.add(bfly);

      // 빛 꼬리 (잔상)
      var TL = 14, tp = new Float32Array(TL*3), ta = new Float32Array(TL);
      for (var q=0;q<TL;q++){ ta[q]=1-q/TL; }
      var tg2 = new THREE.BufferGeometry();
      tg2.setAttribute('position', new THREE.BufferAttribute(tp,3));
      tg2.setAttribute('aA', new THREE.BufferAttribute(ta,1));
      var tm = new THREE.ShaderMaterial({
        uniforms:{ uC:{value:bc} },
        transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
        vertexShader:'attribute float aA; varying float vA;'+
          'void main(){ vA=aA;'+
          ' vec4 mv=modelViewMatrix*vec4(position,1.0);'+
          ' gl_PointSize=aA*4.5*(140.0/-mv.z);'+
          ' gl_Position=projectionMatrix*mv; }',
        fragmentShader:'varying float vA; uniform vec3 uC;'+
          'void main(){ vec2 c=gl_PointCoord-0.5; float d=length(c);'+
          ' if(d>0.5) discard;'+
          ' gl_FragColor=vec4(uC, (1.0-d*2.0)*vA*0.5); }'
      });
      var tail = new THREE.Points(tg2, tm);
      grp.add(tail);

      moons.push({ mesh:bfly, wm:wm, tail:tail, trail:[],
                   r:size*(mn.orbit||1.8), sp:mn.speed||0.7, ph:k*2.1 });
    });

    (d.particles||[]).forEach(function(pt){
      var N=60, pp=new Float32Array(N*3);
      for (var j=0;j<N;j++){
        var a=Math.random()*Math.PI*2, rr=size*(1.25+Math.random()*0.5);
        pp[j*3]=Math.cos(a)*rr;
        pp[j*3+1]=(Math.random()-0.5)*size*1.5;
        pp[j*3+2]=Math.sin(a)*rr;
      }
      var pg=new THREE.BufferGeometry();
      pg.setAttribute('position', new THREE.BufferAttribute(pp,3));
      grp.add(new THREE.Points(pg, new THREE.PointsMaterial({
        color:new THREE.Color(pt.palette ? pt.palette[0] : '#c8a2ff'),
        size:0.09, transparent:true, opacity:0.75,
        blending:THREE.AdditiveBlending, depthWrite:false })));
    });

    if (d.treasure){
      var tg = new THREE.Mesh(
        new THREE.SphereGeometry(size*1.35, 20, 14),
        new THREE.MeshBasicMaterial({color:0xffcc44, transparent:true,
          opacity:0.2, blending:THREE.AdditiveBlending, depthWrite:false}));
      grp.add(tg);
      grp.userData.treasureGlow = tg;
    }

    scene.add(grp);
    scene.add(orbitRing(orbitR));
    planets.push({grp:grp, mesh:mesh, mat:mat, moons:moons,
                  r:orbitR, sp:speed, ph:(i*1.9)%(Math.PI*2), data:d});
    plantFlora(i, d, size);
  });
}

/* 카드 */
var card = document.getElementById('card');
function openCard(d){
  document.getElementById('cN').textContent = d.nickname || (d.iWon ? '🌟 승리의 별' : '🌙 기억의 별');
  document.getElementById('cD').textContent = (d.date||'').slice(0,10);
  document.getElementById('cBU').textContent = '⚫ ' + ((d.black&&d.black.user)||'—');
  document.getElementById('cBS').textContent = (d.black&&d.black.score)||0;
  document.getElementById('cWU').textContent = '⚪ ' + ((d.white&&d.white.user)||'—');
  document.getElementById('cWS').textContent = (d.white&&d.white.score)||0;
  document.getElementById('cWin').textContent = d.winner || '—';
  document.getElementById('cMv').textContent = (d.moves||0) + '수';
  document.getElementById('cKo').textContent = (d.komi||0) + '집';
  document.getElementById('cSz').textContent = Math.round(d.size||d.baseSize||0);
  var b = document.getElementById('cBadge'); b.innerHTML='';
  function badge(txt, cls){ var e=document.createElement('span');
    e.className='bg'+(cls?' '+cls:''); e.textContent=txt; b.appendChild(e); }
  (d.moons||[]).forEach(function(m){ badge('🌙 '+(m.name||'위성')); });
  (d.rings||[]).forEach(function(){ badge('💍 고리'); });
  (d.particles||[]).forEach(function(){ badge('💫 오로라'); });
  if (d.treasure) badge('💎 보물', 'tr');
  card.classList.add('on');
}
window.closeCard = function(){ card.classList.remove('on'); };

/* 조작 */
var th=0.6, ph=0.75, dist=38;
function updCam(){
  camera.position.set(Math.sin(th)*Math.sin(ph)*dist,
    Math.cos(ph)*dist, Math.cos(th)*Math.sin(ph)*dist);
  camera.lookAt(0,0,0);
}
updCam();

var drag=false, lx=0, ly=0, moved=false;
renderer.domElement.addEventListener('pointerdown', function(e){
  drag=true; moved=false; lx=e.clientX; ly=e.clientY; });
addEventListener('pointermove', function(e){
  if(!drag) return;
  var dx=e.clientX-lx, dy=e.clientY-ly;
  if (Math.abs(dx)+Math.abs(dy) > 4) moved=true;
  th -= dx*0.005;
  ph = Math.max(0.12, Math.min(1.5, ph - dy*0.005));
  lx=e.clientX; ly=e.clientY; updCam(); });
addEventListener('pointerup', function(){ drag=false; });
addEventListener('wheel', function(e){
  dist = Math.max(9, Math.min(90, dist + e.deltaY*0.02)); updCam(); }, {passive:true});

var ray = new THREE.Raycaster(), mv = new THREE.Vector2();
renderer.domElement.addEventListener('click', function(e){
  if (moved) return;
  mv.x = (e.clientX/innerWidth)*2-1;
  mv.y = -(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mv, camera);
  var hit = ray.intersectObjects(clickables);
  if (hit.length) openCard(hit[0].object.userData.data);
  else closeCard();
});

addEventListener('resize', function(){
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* 루프 */
var t0 = Date.now(), lastMeteor = 0;
function loop(){
  requestAnimationFrame(loop);
  var t = (Date.now()-t0)/1000;

  window._stars.uniforms.uT.value = t;
  if(window._nebulas) window._nebulas.forEach(function(m){ m.uniforms.uT.value=t; });
  core.material.uniforms.uT.value = t;
  glow.material.uniforms.uT.value = t;
  core.rotation.y = t*0.06;

  planets.forEach(function(p){
    var a = p.ph + t*p.sp;
    p.grp.position.set(Math.cos(a)*p.r, Math.sin(a*1.7)*0.8, Math.sin(a)*p.r);
    p.mesh.rotation.y = t*0.22;
    p.mat.uniforms.uT.value = t;
    p.moons.forEach(function(m){
      var ma = m.ph + t*m.sp*2.2;
      var mx = Math.cos(ma)*m.r;
      var my = Math.sin(ma*0.7)*m.r*0.35 + Math.sin(t*3.0+m.ph)*0.06;
      var mz = Math.sin(ma)*m.r;
      m.mesh.position.set(mx, my, mz);
      m.mesh.rotation.y = -ma;
      if (m.wm) m.wm.uniforms.uT.value = t;
      // 꼬리 잔상
      m.trail.unshift({x:mx,y:my,z:mz});
      if (m.trail.length > 14) m.trail.pop();
      var tp = m.tail.geometry.attributes.position.array;
      for (var q=0; q<m.trail.length; q++){
        tp[q*3]=m.trail[q].x; tp[q*3+1]=m.trail[q].y; tp[q*3+2]=m.trail[q].z;
      }
      m.tail.geometry.attributes.position.needsUpdate = true;
    });
    if (p.grp.userData.treasureGlow)
      p.grp.userData.treasureGlow.scale.setScalar(1 + Math.sin(t*2.2)*0.12);
  });

  var freq = 2600 - Math.min(planets.length*120, 1800);
  if (Date.now()-lastMeteor > freq && Math.random()<0.5){
    lastMeteor = Date.now();
    var pal = ['#9fd8ff','#c8a2ff','#ff9dd4','#ffd76b'];
    spawnMeteor(pal[Math.floor(Math.random()*pal.length)]);
  }

  var mp = mGeo.attributes.position.array;
  var ml = mGeo.attributes.aLife.array;
  for (var i=0;i<METEOR_MAX;i++){
    if (ml[i] > 0){
      mp[i*3]   += meteorVel[i].x;
      mp[i*3+1] += meteorVel[i].y;
      mp[i*3+2] += meteorVel[i].z;
      ml[i] -= 0.011;
      if (ml[i] < 0) ml[i] = 0;
    }
  }
  flMat.uniforms.uT.value = t; syncFlora();
  mGeo.attributes.position.needsUpdate = true;
  mGeo.attributes.aLife.needsUpdate = true;

  renderer.render(scene, camera);
}

/* 행성 탄생 연출 */
window.birthAnimation = function(idx){
  var p = planets[idx];
  if (!p) return;
  var tgt = p.grp.position;
  for (var i=0;i<18;i++){
    (function(){ setTimeout(function(){
      spawnMeteor(['#ffd76b','#ff9dd4','#c8a2ff'][Math.floor(Math.random()*3)],
        {x:tgt.x, y:tgt.y, z:tgt.z});
    }, i*90); })();
  }
  var target = p.mesh.scale.x;
  p.mesh.scale.setScalar(0.01);
  setTimeout(function(){
    var s0 = Date.now();
    (function grow(){
      var k = Math.min((Date.now()-s0)/900, 1);
      var e = 1 - Math.pow(1-k, 3);
      p.mesh.scale.setScalar(0.01 + e*target);
      if (k<1) requestAnimationFrame(grow);
    })();
  }, 1500);
};

build();
loop();

try {
  var seen = parseInt(sessionStorage.getItem('g1_seen')||'0', 10);
  var now = (window.Galaxy ? Galaxy.load().length : 0);
  if (now > seen && seen > 0) birthAnimation(now-1);
  sessionStorage.setItem('g1_seen', now);
} catch(e){}

window._rebuild = build;
window._r = renderer;
window._r = renderer;
console.log('[G1] 은하계 v2 — 행성', planets.length);
})();
</script>
