<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>태양풍 수확 — Dot Space</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:monospace;touch-action:none;-webkit-user-select:none;user-select:none}
#wrap{width:100vw;height:100vh;position:relative;background:#000}
canvas#gc{position:absolute;inset:0;width:100%;height:100%}
.hud{position:absolute;top:0;left:0;right:0;height:38px;background:rgba(0,2,12,1.0);border-bottom:1px solid rgba(255,140,0,0.55);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:10;font-size:11px;color:#F5A623}
.hud-l{display:flex;align-items:center;gap:14px}
.hud-stat{font-size:10px;color:rgba(255,140,0,0.95)}
.hud-stat b{color:#F5A623}
.back{font-size:9px;color:rgba(255,140,0,0.85);padding:3px 8px;border:1px solid rgba(255,140,0,0.55);border-radius:5px;cursor:pointer;text-decoration:none}
.back:hover{color:#F5A623;border-color:#F5A623}
.botbar{position:absolute;bottom:0;left:0;right:0;height:42px;background:rgba(0,2,12,1.0);border-top:1px solid rgba(255,140,0,0.45);display:flex;align-items:center;gap:8px;padding:0 12px;z-index:10}
.abtn{padding:4px 12px;border-radius:8px;border:1px solid rgba(255,140,0,0.65);color:rgba(255,140,0,1.0);font-size:9px;cursor:pointer;background:none;font-family:monospace}
.abtn:hover{border-color:#F5A623;color:#F5A623}
.feed{flex:1;font-size:9px;color:rgba(255,140,0,0.7);overflow:hidden;white-space:nowrap}
/* 중앙 클릭 존 */
#clickZone{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:160px;height:160px;border-radius:50%;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center}
/* 타이밍 링 UI */
#timingRing{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:6}
/* 결과 팝업 */
#resultPop{display:none;position:absolute;left:50%;top:22%;transform:translate(-50%,-50%);background:rgba(0,2,12,1.0);border:1px solid #F5A623;border-radius:12px;padding:14px 28px;text-align:center;z-index:20;pointer-events:none;min-width:180px}
#resultPop.show{display:block;animation:popIn .25s ease}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(0.75);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
#rTitle{font-size:13px;font-weight:bold;margin-bottom:4px}
#rAmt{font-size:22px;font-weight:bold;color:#F5A623;margin:4px 0}
#rSub{font-size:10px;color:rgba(255,255,255,0.7)}
/* 사이드 패널 */
.side{position:absolute;right:0;top:38px;bottom:42px;width:190px;background:rgba(0,2,12,1.0);border-left:1px solid rgba(255,140,0,0.47);z-index:8;padding:10px;overflow-y:auto}
.side-title{font-size:10px;color:rgba(255,140,0,0.95);margin-bottom:8px;font-weight:bold}
.star-item{padding:6px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.41);background:rgba(255,255,255,0.37);margin-bottom:5px;cursor:pointer}
.star-item:hover{border-color:rgba(255,140,0,0.65)}
.star-item.on{border-color:#F5A623;background:rgba(255,140,0,0.43)}
.star-name{font-size:10px;font-weight:bold}
.star-info{font-size:9px;color:rgba(255,255,255,0.7);margin-top:2px}
.stat-row{display:flex;justify-content:space-between;font-size:10px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.4)}
.stat-row span:first-child{color:rgba(255,255,255,0.75)}
.stat-row span:last-child{color:#F5A623;font-weight:bold}
/* 콤보 표시 */
#comboDisp{position:absolute;left:50%;bottom:100px;transform:translateX(-50%);font-size:18px;font-weight:bold;color:#FF4500;pointer-events:none;z-index:10;opacity:0;transition:opacity .3s;text-shadow:0 0 10px #FF4500}
/* 난이도 표시 */
#diffDisp{position:absolute;left:14px;top:50px;font-size:10px;color:rgba(255,140,0,0.85);z-index:8;line-height:1.8}
/* 플레어 경고 */
#flareWarn{display:none;position:absolute;left:50%;top:55px;transform:translateX(-50%);background:rgba(255,69,0,0.5);border:1px solid #FF4500;border-radius:8px;padding:5px 16px;font-size:11px;color:#FF4500;z-index:15;animation:warn .5s ease infinite alternate}
@keyframes warn{from{opacity:0.6}to{opacity:1}}
</style>
<script src="/dot/avatar.js?v=1783849704"></script>
</head>
<body>
<div id="wrap">
<canvas id="gc"></canvas>
<div id="timingRing"></div>
<div id="clickZone" onclick="harvest()"></div>
<div id="resultPop"><div id="rTitle">☀️ 수확 성공!</div><div id="rAmt">+0 SAU</div><div id="rSub">타이밍 완벽!</div></div>
<div id="comboDisp">⚡ COMBO ×1</div>
<div id="flareWarn">🔥 태양 플레어 발생! — 지금 클릭!</div>
<div id="diffDisp"></div>
<div class="hud">
  <div class="hud-l">
    <span>☀️ 태양풍 에너지 수확</span>
    <span class="hud-stat">세션 SAU <b id="sessSAU">0</b></span>
    <span class="hud-stat">콤보 <b id="comboVal">×1</b></span>
    <span class="hud-stat">정확도 <b id="accVal">—</b></span>
  </div>
  <a class="back" href="/dot.html">← 지도</a>
</div>
<div class="side">
  <div class="side-title">항성 선택</div>
  <div id="starList"></div>
  <div style="margin-top:12px;border-top:1px solid rgba(255,255,255,0.4);padding-top:10px">
    <div class="side-title">이번 세션</div>
    <div class="stat-row"><span>총 수확</span><span id="stTotal">0 SAU</span></div>
    <div class="stat-row"><span>성공 횟수</span><span id="stHit">0</span></div>
    <div class="stat-row"><span>실패 횟수</span><span id="stMiss">0</span></div>
    <div class="stat-row"><span>최대 콤보</span><span id="stMaxCombo">×1</span></div>
    <div class="stat-row"><span>최고 정확도</span><span id="stBestAcc">—</span></div>
  </div>
</div>
<div class="botbar">
  <button class="abtn" onclick="changestar()">🌟 항성 변경</button>
  <button class="abtn" onclick="resetSession()">🔄 리셋</button>
  <div class="feed" id="feed">[ SOLAR ] 항성을 선택하고 박자에 맞춰 클릭!</div>
</div>
</div>
<script src="/dot/space-engine.js"></script>
<script>
const gc=document.getElementById('gc');
const ctx=gc.getContext('2d');
let W=0,H=0,frame=0;

// 항성 데이터
const STARS=[
  {name:'Proxima Centauri',type:'적색왜성',color:'#FF6B6B',period:120,irregularity:0.05,sau:8, desc:'느리고 예측 쉬움'},
  {name:'Sirius',          type:'백색성',  color:'#B0E0FF',period:80, irregularity:0.10,sau:15,desc:'중간 난이도'},
  {name:'Vega',            type:'A형 주계열',color:'#E8F4FF',period:65,irregularity:0.15,sau:20,desc:'빠른 맥박'},
  {name:'Betelgeuse',      type:'적색초거성',color:'#FF4500',period:95,irregularity:0.30,sau:35,desc:'불규칙! 고보상'},
  {name:'Rigel',           type:'청색초거성',color:'#4488FF',period:55,irregularity:0.20,sau:28,desc:'매우 빠름'},
  {name:'Aldebaran',       type:'적색거성', color:'#FF8C00',period:110,irregularity:0.12,sau:18,desc:'안정적 고수익'},
  {name:'Canopus',         type:'황백색성', color:'#FFFACD',period:70, irregularity:0.18,sau:22,desc:'중상 난이도'},
  {name:'Antares',         type:'적색초거성',color:'#DC143C',period:88, irregularity:0.35,sau:40,desc:'극불규칙 최고보상'},
];

let curStar=STARS[0];
let starPhase=0;       // 0~1 맥박 위치
let starSpeed=1;       // 현재 속도 배율
let combo=0,maxCombo=1,totalSAU=0,hitCount=0,missCount=0,bestAcc=null;
let msCombo=false,msSau=false; // 마일스톤 멘트 플래그 (세션당 1회)
let solarSessionStart=Date.now();
const _userId=SpaceEngine.userId;
async function loadSauBalance(){
  const bal=await SpaceEngine.loadSauBalance();
  if(bal)feed('[로드] 보유 SAU '+bal.total.toFixed(1)+' (서버 누적)');
}
async function reportSAU(game,sessionSau,seconds){
  return SpaceEngine.reportSAU(game,sessionSau,seconds,msg=>feed('[알림] '+msg));
}
async function flushSolarSAU(){
  if(totalSAU<=0)return;
  const elapsed=Math.max(1,(Date.now()-solarSessionStart)/1000);
  const sau=totalSAU;
  totalSAU=0;
  const granted=await reportSAU('solar',sau,elapsed);
  feed('[정산] 세션 SAU 서버 적립: +'+granted.toFixed(1));
  if(window.AvatarWidget){ AvatarWidget.speakAI('solar', Math.round(granted), 'gameover', granted >= 50 ? '멋진 세력 확장이었어요! 바둑에서 화점 포석으로 판 전체를 지배하는 감각, 바로 이겁니다.' : '세력은 한 번에 만들어지지 않아요. 화점처럼 넓게 보는 눈을 기르세요!'); }
  solarSessionStart=Date.now();
}
window.addEventListener('beforeunload',()=>{
  if(totalSAU>0){
    navigator.sendBeacon&&navigator.sendBeacon('/sau-api/session',JSON.stringify({user_id:_userId,game:'solar',session_sau:totalSAU,session_seconds:Math.max(1,(Date.now()-solarSessionStart)/1000)}));
  }
});
let lastHarvestPhase=null;
let particles=[];
let flareActive=false,flareTimer=null;
let resultTimer=null;

// 화면 크기
function resize(){
  W=gc.offsetWidth;H=gc.offsetHeight;
  gc.width=W;gc.height=H;
}

// 항성 목록 렌더
function renderStarList(){
  const el=document.getElementById('starList');
  el.innerHTML=STARS.map((s,i)=>`
    <div class="star-item${s===curStar?' on':''}" onclick="selectStar(${i})">
      <div class="star-name" style="color:${s.color}">${s.name}</div>
      <div class="star-info">${s.type} · ${s.sau} SAU · ${s.desc}</div>
    </div>`).join('');
}
function selectStar(i){curStar=STARS[i];starPhase=0;combo=0;renderStarList();updateDiff();feed('[항성] '+curStar.name+' 선택 — 맥박에 맞춰 클릭!');}

function updateDiff(){
  document.getElementById('diffDisp').innerHTML=
    `항성: <span style="color:${curStar.color}">${curStar.name}</span><br>`+
    `유형: ${curStar.type}<br>`+
    `주기: ${curStar.period}f<br>`+
    `불규칙: ${Math.round(curStar.irregularity*100)}%<br>`+
    `보상: <span style="color:#F5A623">${curStar.sau} SAU</span>`;
}

// 수확 판정
function harvest(){
  if(!curStar)return;
  // 맥박 최대(peak)는 phase≈0.5 근방
  const peak=0.5;
  const diff=Math.abs(starPhase-peak);
  const acc=Math.max(0,1-diff*3.5); // 0~1
  const pct=Math.round(acc*100);

  if(acc>0.55){
    // 성공
    combo++;maxCombo=Math.max(maxCombo,combo+1);
    if(!msCombo && combo>=5 && window.AvatarWidget){
      msCombo=true;
      AvatarWidget.speakAI('solar', Math.round(totalSAU), 'milestone', '콤보 5 달성! 흐름을 놓치지 않는군요. 바둑의 세력도 이렇게 끊기지 않게 이어가는 것이 핵심입니다.');
    }
    hitCount++;
    const flareBonus=flareActive?3:1;
    const gain=curStar.sau*acc*(1+combo*0.15)*flareBonus;
    totalSAU+=gain;
    if(!msSau && totalSAU>=50 && window.AvatarWidget){
      msSau=true;
      AvatarWidget.speakAI('solar', Math.round(totalSAU), 'milestone', '세션 50 SAU 돌파! 화점에서 뻗어나가는 세력처럼 영향력이 커지고 있어요.');
    }
    document.getElementById('sessSAU').textContent=totalSAU.toFixed(0);
    document.getElementById('comboVal').textContent='×'+(combo+1);
    document.getElementById('accVal').textContent=pct+'%';
    if(!bestAcc||pct>bestAcc)bestAcc=pct;
    spawnHit(W/2,H/2,curStar.color,gain,pct);
    showResult(true,gain,pct,flareActive);
    if(flareActive){clearTimeout(flareTimer);endFlare();}
  } else {
    // 실패
    combo=0;missCount++;
    document.getElementById('comboVal').textContent='×1';
    spawnMiss(W/2,H/2);
    showResult(false,0,pct,false);
  }
  updateStats();
  lastHarvestPhase=starPhase;
}

function showResult(ok,gain,pct,flare){
  const pop=document.getElementById('resultPop');
  const cd=document.getElementById('comboDisp');
  if(ok){
    pop.style.borderColor=flare?'#FF4500':curStar.color;
    document.getElementById('rTitle').textContent=flare?'🔥 플레어 수확!':pct>=90?'🎯 퍼펙트!':pct>=70?'✅ 성공!':'👌 수확!';
    document.getElementById('rTitle').style.color=flare?'#FF4500':curStar.color;
    document.getElementById('rAmt').textContent='+'+gain.toFixed(1)+' SAU';
    document.getElementById('rSub').textContent='정확도 '+pct+'%'+(combo>1?' · COMBO ×'+(combo):'')+(flare?' · 플레어 ×3':'');
    if(combo>1){cd.textContent='⚡ COMBO ×'+combo;cd.style.opacity='1';setTimeout(()=>cd.style.opacity='0',900);}
  } else {
    pop.style.borderColor='#e74c3c';
    document.getElementById('rTitle').textContent='❌ 타이밍 미스';
    document.getElementById('rTitle').style.color='#e74c3c';
    document.getElementById('rAmt').textContent='콤보 리셋';
    document.getElementById('rSub').textContent='정확도 '+pct+'% — 맥박 최대점에서 클릭!';
  }
  pop.classList.add('show');
  if(resultTimer)clearTimeout(resultTimer);
  resultTimer=setTimeout(()=>pop.classList.remove('show'),1400);
}

function updateStats(){
  document.getElementById('stTotal').textContent=totalSAU.toFixed(1)+' SAU';
  document.getElementById('stHit').textContent=hitCount;
  document.getElementById('stMiss').textContent=missCount;
  document.getElementById('stMaxCombo').textContent='×'+maxCombo;
  document.getElementById('stBestAcc').textContent=bestAcc?bestAcc+'%':'—';
}

// 파티클
function spawnHit(x,y,col,gain,pct){
  for(let i=0;i<20+pct/5;i++){
    const a=Math.random()*Math.PI*2,v=3+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,col,life:1,sz:2+Math.random()*3,d:0.025+Math.random()*0.02,type:'hit'});
  }
  // SAU 텍스트 파티클
  particles.push({x,y:y-60,txt:'+'+gain.toFixed(1)+' SAU',col:'#F5A623',life:1,vy:-1.2,type:'txt'});
}
function spawnMiss(x,y){
  for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,v=2+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,col:'rgba(231,76,60,1.0)',life:1,sz:2+Math.random()*2,d:0.04,type:'hit'});}
  particles.push({x,y:y-50,txt:'MISS',col:'#e74c3c',life:1,vy:-1,type:'txt'});
}

// 태양 플레어 이벤트
function triggerFlare(){
  if(flareActive)return;
  flareActive=true;
  document.getElementById('flareWarn').style.display='block';
  feed('[플레어] 🔥 태양 플레어! 지금 클릭하면 ×3 보상!');
  flareTimer=setTimeout(endFlare,3000);
}
function endFlare(){flareActive=false;document.getElementById('flareWarn').style.display='none';}

function changestar(){
  const i=(STARS.indexOf(curStar)+1)%STARS.length;selectStar(i);
}
function resetSession(){
  flushSolarSAU();
  hitCount=0;missCount=0;combo=0;maxCombo=1;bestAcc=null;
  msCombo=false;msSau=false;
  document.getElementById('sessSAU').textContent='0';document.getElementById('comboVal').textContent='×1';document.getElementById('accVal').textContent='—';
  updateStats();feed('[리셋] 세션 초기화!');
}
const fq=[];
function feed(m){fq.unshift(m);if(fq.length>3)fq.pop();document.getElementById('feed').textContent='[ SOLAR ] '+fq[0];}
</script>
<script>
// ── 메인 렌더 루프 ──
function loop(){
  ctx.clearRect(0,0,W,H);

  // 배경 — 우주
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.8);
  bg.addColorStop(0,'#020010');bg.addColorStop(1,'#000000');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // 배경 별들
  if(frame%4===0){for(let i=0;i<2;i++){ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,0.5,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();}}

  const cx=W/2,cy=H/2;
  const s=curStar;

  // 맥박 계산 — 불규칙 변수 추가
  const irr=s.irregularity;
  const noise=Math.sin(frame*0.07)*irr+Math.sin(frame*0.13)*irr*0.5;
  starPhase=(Math.sin((frame/s.period+noise)*Math.PI*2)*0.5+0.5);
  const pulse=0.7+starPhase*0.6; // 크기 배율 0.7~1.3

  const baseR=Math.min(W,H)*0.13;
  const r=baseR*pulse;

  // 외부 코로나 링들
  for(let i=3;i>=1;i--){
    const cr2=r+i*22*pulse;
    const alpha=(0.06-i*0.015)*starPhase;
    ctx.beginPath();ctx.arc(cx,cy,cr2,0,Math.PI*2);
    ctx.strokeStyle=s.color+Math.round(alpha*255).toString(16).padStart(2,'0');
    ctx.lineWidth=8-i*2;ctx.stroke();
  }

  // 태양풍 방출선 (맥박 최대 근처에서 강해짐)
  if(starPhase>0.6){
    const rays=12;
    for(let i=0;i<rays;i++){
      const a=(i/rays)*Math.PI*2+frame*0.005;
      const len=r*1.8*(starPhase-0.6)*2.5;
      ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*r*0.9,cy+Math.sin(a)*r*0.9);
      ctx.lineTo(cx+Math.cos(a)*(r+len),cy+Math.sin(a)*(r+len));
      const alpha=Math.round((starPhase-0.6)*200);
      ctx.strokeStyle=s.color+(alpha.toString(16).padStart(2,'0'));
      ctx.lineWidth=1.5;ctx.stroke();
    }
  }

  // 항성 본체 그라디언트
  const sg=ctx.createRadialGradient(cx-r*.25,cy-r*.25,r*.05,cx,cy,r);
  sg.addColorStop(0,'rgba(255,255,255,1.0)');
  sg.addColorStop(0.2,s.color);
  sg.addColorStop(0.7,s.color+'BB');
  sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle=s.color+'AA';ctx.lineWidth=1;ctx.stroke();

  if(!window._ringAngle)window._ringAngle=Math.random()*Math.PI*2;
  window._ringAngle+=0.0018;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(window._ringAngle);ctx.scale(1,0.32);
  ctx.beginPath();ctx.arc(0,0,r*2.3,Math.PI*0.05,Math.PI*0.95);
  ctx.strokeStyle=s.color+'AA';ctx.lineWidth=r*0.22;ctx.stroke();
  ctx.restore();

  if(!window._orbiters){
    window._orbiters=Array.from({length:3},(_,i)=>({
      dist:1.8+i*0.7,angle:Math.random()*Math.PI*2,
      speed:(0.004+Math.random()*0.006)*(Math.random()<0.5?1:-1),
      size:3+Math.random()*3.5,col:['#C0C0C0','#5DADE2','#E5E4E2'][i%3]
    }));
  }
  window._orbiters.forEach(o=>{
    o.angle+=o.speed;
    const ox=cx+Math.cos(o.angle)*r*o.dist,oy=cy+Math.sin(o.angle)*r*o.dist*0.35;
    if(Math.sin(o.angle)<0){
      ctx.beginPath();ctx.arc(ox,oy,o.size,0,Math.PI*2);
      ctx.fillStyle=o.col;ctx.globalAlpha=0.4;ctx.fill();ctx.globalAlpha=1;
    }
  });

  ctx.save();ctx.translate(cx,cy);ctx.rotate(window._ringAngle);ctx.scale(1,0.32);
  ctx.beginPath();ctx.arc(0,0,r*2.3,Math.PI*1.05,Math.PI*1.95);
  ctx.strokeStyle=s.color+'EE';ctx.lineWidth=r*0.22;ctx.stroke();
  ctx.restore();

  window._orbiters.forEach(o=>{
    const ox=cx+Math.cos(o.angle)*r*o.dist,oy=cy+Math.sin(o.angle)*r*o.dist*0.35;
    if(Math.sin(o.angle)>=0){
      ctx.beginPath();ctx.arc(ox,oy,o.size*1.5,0,Math.PI*2);ctx.fillStyle=o.col;ctx.fill();
      ctx.beginPath();ctx.arc(ox,oy,o.size*2.3,0,Math.PI*2);ctx.strokeStyle=o.col+'40';ctx.lineWidth=1;ctx.stroke();
    }
  });

  if(!window._sparkles){
    window._sparkles=Array.from({length:14},()=>({
      angle:Math.random()*Math.PI*2,dist:1.0+Math.random()*1.5,
      phase:Math.random()*Math.PI*2,speed:0.02+Math.random()*0.04,
      col:['#FFD700','#00FFFF','#FF69B4','#7FFF00','#FFA500','#87CEFA','#DA70D6'][Math.floor(Math.random()*7)]
    }));
  }
  window._sparkles.forEach(sp=>{
    sp.phase+=sp.speed;
    const tw=0.4+Math.sin(sp.phase)*0.6;
    if(tw<0.1)return;
    const spx=cx+Math.cos(sp.angle)*r*sp.dist,spy=cy+Math.sin(sp.angle)*r*sp.dist;
    const spG=ctx.createRadialGradient(spx,spy,0,spx,spy,3.5+tw*3.5);
    spG.addColorStop(0,sp.col);spG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=tw;
    ctx.fillStyle=spG;ctx.beginPath();ctx.arc(spx,spy,3.5+tw*3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=sp.col;ctx.beginPath();ctx.arc(spx,spy,1.6+tw*1.8,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });

  // 타이밍 가이드 — 외부 링 (맥박 최대점 표시)
  const guideR=baseR*1.3+30;
  ctx.beginPath();ctx.arc(cx,cy,guideR,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.43)';ctx.lineWidth=1;ctx.setLineDash([4,8]);ctx.stroke();ctx.setLineDash([]);

  // 타이밍 인디케이터 — 현재 phase 위치
  const indA=-Math.PI/2;
  const indR=guideR+18;
  const dotA=indA+starPhase*Math.PI*2;
  ctx.beginPath();ctx.arc(cx+Math.cos(dotA)*indR,cy+Math.sin(dotA)*indR,5,0,Math.PI*2);
  const dotCol=starPhase>0.42&&starPhase<0.58?'#00FF7F':starPhase>0.35&&starPhase<0.65?'#F5A623':'rgba(255,255,255,0.65)';
  ctx.fillStyle=dotCol;ctx.fill();

  // "클릭 존" 최적 구간 표시 (45%~55% 구간 = 초록)
  const arcStart=indA+0.42*Math.PI*2,arcEnd=indA+0.58*Math.PI*2;
  ctx.beginPath();ctx.arc(cx,cy,indR,arcStart,arcEnd);
  ctx.strokeStyle='rgba(0,255,127,0.75)';ctx.lineWidth=4;ctx.stroke();

  // 플레어 상태 — 전체 화면 붉은빛
  if(flareActive){
    ctx.fillStyle='rgba(255,69,0,'+(0.04+Math.sin(frame*0.15)*0.03)+')';
    ctx.fillRect(0,0,W,H);
  }

  // 파티클
  particles=particles.filter(p=>{
    if(p.type==='txt'){
      p.y+=p.vy;p.life-=0.022;if(p.life<=0)return false;
      ctx.globalAlpha=p.life;ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillStyle=p.col;ctx.fillText(p.txt,p.x,p.y);ctx.globalAlpha=1;
    } else {
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=p.d;if(p.life<=0)return false;
      ctx.globalAlpha=p.life;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();ctx.globalAlpha=1;
    }
    return true;
  });

  // 항성 이름 + 클릭 안내
  ctx.font='bold 13px monospace';ctx.textAlign='center';
  ctx.fillStyle=s.color;ctx.fillText(s.name,cx,cy+r+44);
  ctx.font='9px monospace';ctx.fillStyle='rgba(255,255,255,0.65)';
  const ph=starPhase;
  const hint=ph>0.42&&ph<0.58?'🟢 지금 클릭!':ph>0.35&&ph<0.65?'🟡 거의 최적':' ';
  ctx.fillText(hint,cx,cy+r+60);

  // 랜덤 플레어 이벤트 (평균 800프레임에 1번)
  if(Math.random()<0.00125)triggerFlare();

  frame++;requestAnimationFrame(loop);
}

resize();
window.addEventListener('resize',resize);
renderStarList();
updateDiff();
feed('[SOLAR] '+curStar.name+' — 맥박 최대점(🟢)에서 클릭해서 SAU 수확!');
loadSauBalance();
loop();
</script>
