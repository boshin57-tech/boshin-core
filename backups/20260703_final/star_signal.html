<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>항성 신호 해독 — Dot Space L2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:monospace;touch-action:none;-webkit-user-select:none;user-select:none}
#wrap{width:100vw;height:100vh;position:relative;background:#020010}
canvas#gc{position:absolute;inset:0;width:100%;height:100%;cursor:pointer}
.hud{position:absolute;top:0;left:0;right:0;height:38px;background:rgba(0,2,12,1.0);border-bottom:1px solid rgba(155,89,182,0.6);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:10;font-size:11px;color:#9B59B6}
.hud-stat{font-size:10px;color:rgba(155,89,182,0.95)}
.hud-stat b{color:#9B59B6}
.back{font-size:9px;color:rgba(155,89,182,0.85);padding:3px 8px;border:1px solid rgba(155,89,182,0.55);border-radius:5px;cursor:pointer;text-decoration:none}
.back:hover{color:#9B59B6;border-color:#9B59B6}
#statusMsg{position:absolute;left:50%;bottom:70px;transform:translateX(-50%);font-size:13px;color:rgba(255,255,255,0.9);text-align:center;width:340px;z-index:8}
.botbar{position:absolute;bottom:0;left:0;right:0;height:42px;background:rgba(0,2,12,1.0);border-top:1px solid rgba(155,89,182,0.5);display:flex;align-items:center;gap:8px;padding:0 12px;z-index:10}
.abtn{padding:4px 12px;border-radius:8px;border:1px solid rgba(155,89,182,0.65);color:rgba(155,89,182,1.0);font-size:9px;cursor:pointer;background:none;font-family:monospace}
.abtn:hover{border-color:#9B59B6;color:#9B59B6}
.feed{flex:1;font-size:9px;color:rgba(155,89,182,0.7);overflow:hidden;white-space:nowrap}
#resultPop{display:none;position:absolute;left:50%;top:18%;transform:translate(-50%,-50%);background:rgba(0,2,12,1.0);border:1px solid #9B59B6;border-radius:12px;padding:14px 28px;text-align:center;z-index:20;min-width:200px}
#resultPop.show{display:block;animation:popIn .25s ease}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(0.75);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
#rTitle{font-size:14px;font-weight:bold;color:#9B59B6;margin-bottom:4px}
#rAmt{font-size:20px;font-weight:bold;color:#FFD700;margin:4px 0}
#rSub{font-size:10px;color:rgba(255,255,255,0.75)}
.layer-badge{position:absolute;top:46px;right:12px;font-size:9px;color:rgba(155,89,182,0.75);z-index:8}
</style>
</head>
<body>
<div id="wrap">
<canvas id="gc"></canvas>
<div class="hud">
  <span>📡 항성 신호 해독 — Layer 2</span>
  <span class="hud-stat">라운드 <b id="roundDisp">0</b>/12</span>
  <span class="hud-stat">SAU <b id="sauDisp">0</b></span>
  <a class="back" href="/dot.html">← 지도</a>
</div>
<div class="layer-badge">⬡ L2 전용 — 패턴 기억 게임</div>
<div id="statusMsg">패턴을 기억하고 똑같이 클릭하세요</div>
<div id="resultPop"><div id="rTitle">📡 신호 수신 성공!</div><div id="rAmt">+0 SAU</div><div id="rSub"></div></div>
<div class="botbar">
  <button class="abtn" onclick="startGame()">▶ 게임 시작</button>
  <button class="abtn" onclick="resetGame()">🔄 리셋</button>
  <div class="feed" id="feed">[ SIGNAL ] 게임 시작을 눌러주세요</div>
</div>
</div>
<script src="/dot/space-engine.js"></script>
<script>
const gc=document.getElementById('gc');
const ctx=gc.getContext('2d');
let W=0,H=0,frame=0;
function resize(){W=gc.offsetWidth;H=gc.offsetHeight;gc.width=W;gc.height=H;}

const ZONE_COUNT=6;
const ZONE_COLORS=['#9B59B6','#E91E8C','#3498DB','#1ABC9C','#F39C12','#E74C3C'];
const STAR_COLOR='#9B59B6',STAR_COLOR2='#D2A6E8';
let zones=[];
let pattern=[],userInput=[];
let round=0,totalSAU=0,gameActive=false,showingPattern=false;
let signalSessionStart=Date.now();
const _userId=SpaceEngine.userId;
async function loadSauBalance(){
  const bal=await SpaceEngine.loadSauBalance();
  if(bal)feed('[로드] 보유 SAU '+bal.total.toFixed(1)+' (서버 누적)');
}
async function reportSAU(game,sessionSau,seconds){
  return SpaceEngine.reportSAU(game,sessionSau,seconds,msg=>feed('[알림] '+msg));
}
async function flushSignalSAU(){
  if(totalSAU<=0)return;
  const elapsed=Math.max(1,(Date.now()-signalSessionStart)/1000);
  const sau=totalSAU;
  const granted=await reportSAU('signal',sau,elapsed);
  document.getElementById('sauDisp').textContent=granted.toFixed(0);
  feed('[정산] 서버 적립 완료: +'+granted.toFixed(1)+' SAU');
  if(window.AvatarWidget){ AvatarWidget.speakAI('signal', (typeof score!=='undefined'?score:0), 'gameover', granted >= 50 ? '수읽기 실력이 대단한데요! 이 감각이면 바둑에서 상대 노림수를 미리 볼 수 있어요.' : '패턴 읽기는 반복이 답입니다. 바둑 수읽기도 매일 조금씩 늘어요!'); }
  signalSessionStart=Date.now();
}
let resultTimer=null;
let starPulse=0;

function buildZones(){
  zones=[];
  for(let i=0;i<ZONE_COUNT;i++){
    const a=(i/ZONE_COUNT)*Math.PI*2-Math.PI/2;
    zones.push({idx:i,angle:a,col:ZONE_COLORS[i],lit:0,state:'idle',orbitOffset:Math.random()*Math.PI*2});
  }
}
buildZones();

function startGame(){
  if(gameActive)return;
  gameActive=true;round=0;pattern=[];totalSAU=0;
  document.getElementById('sauDisp').textContent='0';
  nextRound();
}
function resetGame(){
  gameActive=false;round=0;pattern=[];userInput=[];totalSAU=0;
  zones.forEach(z=>{z.lit=0;z.state='idle';});
  document.getElementById('roundDisp').textContent='0';
  document.getElementById('sauDisp').textContent='0';
  document.getElementById('statusMsg').textContent='패턴을 기억하고 똑같이 클릭하세요';
  feed('[리셋] 게임 초기화');
}
function nextRound(){
  round++;
  userInput=[];
  pattern.push(Math.floor(Math.random()*ZONE_COUNT));
  document.getElementById('roundDisp').textContent=round;
  document.getElementById('statusMsg').textContent='신호를 수신하는 중...';
  feed('[라운드 '+round+'] 패턴 길이 '+pattern.length);
  showPattern();
}
function showPattern(){
  showingPattern=true;
  let i=0;
  const interval=setInterval(()=>{
    if(i>0)zones[pattern[i-1]].state='idle';
    if(i<pattern.length){
      zones[pattern[i]].state='lit';
      i++;
    } else {
      clearInterval(interval);
      setTimeout(()=>{
        zones.forEach(z=>z.state='idle');
        showingPattern=false;
        document.getElementById('statusMsg').textContent='이제 같은 순서로 클릭하세요! ('+pattern.length+'개)';
      },400);
    }
  },700);
}
function onZoneClick(i){
  if(!gameActive||showingPattern)return;
  const z=zones[i];
  z.state='flash';
  setTimeout(()=>{if(z.state==='flash')z.state='idle';},200);

  userInput.push(i);
  const idx=userInput.length-1;

  if(userInput[idx]!==pattern[idx]){
    z.state='wrong';
    setTimeout(()=>{if(z.state==='wrong')z.state='idle';},500);
    gameOver();
    return;
  }
  if(userInput.length===pattern.length){
    z.state='correct';
    setTimeout(()=>{if(z.state==='correct')z.state='idle';},400);
    roundClear();
  }
}
function roundClear(){
  let gain=0,tier='';
  if(round>=12){gain=400;tier='🏆 12단계 풀클리어!';}
  else if(round>=9){gain=150;tier='⭐ 9단계 돌파!';}
  else if(round>=6){gain=60;tier='✨ 6단계 돌파!';}
  else if(round>=3){gain=20;tier='✅ 3단계 돌파!';}

  if(gain>0){
    totalSAU+=gain;
    if(!window._msSig && totalSAU>=50 && window.AvatarWidget){
      window._msSig=true;
      AvatarWidget.speakAI('signal', Math.round(totalSAU), 'milestone', '50 SAU 돌파! 패턴이 눈에 들어오기 시작했군요. 바둑 수읽기도 이렇게 반복 속에서 형태가 보이는 거예요.');
    }
    document.getElementById('sauDisp').textContent=totalSAU.toFixed(0);
    showResult(true,gain,tier);
    feed('[클리어] 라운드 '+round+' 성공! +'+gain+' SAU');
  } else {
    feed('[성공] 라운드 '+round+' 클리어');
  }
  if(round>=12){
    setTimeout(()=>{
      gameActive=false;
      document.getElementById('statusMsg').textContent='🎉 모든 라운드 클리어! 리셋하고 다시 도전하세요';
      feed('[완료] 전체 12라운드 클리어!');flushSignalSAU();
    },1000);
    return;
  }
  setTimeout(nextRound,1200);
}
function gameOver(){
  gameActive=false;
  showResult(false,0,'라운드 '+round+'에서 실패');
  document.getElementById('statusMsg').textContent='❌ 패턴 실패! 리셋하고 다시 도전하세요';
  feed('[실패] 라운드 '+round+'에서 게임 오버. 정산 중...');
  flushSignalSAU();
}
function showResult(ok,gain,msg){
  const pop=document.getElementById('resultPop');
  if(ok){
    document.getElementById('rTitle').textContent='📡 신호 해독 성공!';
    document.getElementById('rTitle').style.color='#27AE60';
    document.getElementById('rAmt').textContent='+'+gain+' SAU';
    document.getElementById('rSub').textContent=msg;
    pop.style.borderColor='#27AE60';
  } else {
    document.getElementById('rTitle').textContent='❌ 패턴 실패';
    document.getElementById('rTitle').style.color='#e74c3c';
    document.getElementById('rAmt').textContent='총 '+totalSAU.toFixed(0)+' SAU 획득';
    document.getElementById('rSub').textContent=msg;
    pop.style.borderColor='#e74c3c';
  }
  pop.classList.add('show');
  if(resultTimer)clearTimeout(resultTimer);
  resultTimer=setTimeout(()=>pop.classList.remove('show'),1800);
}
const fq=[];
function feed(m){fq.unshift(m);if(fq.length>3)fq.pop();document.getElementById('feed').textContent='[ SIGNAL ] '+fq[0];}

SpaceEngine.bindTap(gc, (e, pt)=>{
  const cx=W/2,cy=H/2,orbR=Math.min(W,H)*0.32;
  const hitR=SpaceEngine.isTouchDevice()?44:32;
  zones.forEach(z=>{
    const a=z.angle+frame*0.002;
    const zx=cx+Math.cos(a)*orbR,zy=cy+Math.sin(a)*orbR*0.55;
    if(Math.hypot(pt.x-zx,pt.y-zy)<hitR)onZoneClick(z.idx);
  });
});
</script>
<script>
function loop(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.8);
  bg.addColorStop(0,'#0a0014');bg.addColorStop(1,'#000000');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  if(frame%4===0){for(let i=0;i<2;i++){ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,0.5,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();}}

  const cx=W/2,cy=H/2;
  const r=Math.min(W,H)*0.1;
  const orbR=Math.min(W,H)*0.32;

  starPulse+=0.03;
  const pulse=0.9+Math.sin(starPulse)*0.1;

  // 궤도 가이드 라인
  ctx.beginPath();ctx.ellipse(cx,cy,orbR,orbR*0.55,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(155,89,182,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,6]);ctx.stroke();ctx.setLineDash([]);

  // 외곽 글로우
  const glowR=r*pulse*3.2;
  const g=ctx.createRadialGradient(cx,cy,r*0.5,cx,cy,glowR);
  g.addColorStop(0,STAR_COLOR+'88');
  g.addColorStop(0.5,STAR_COLOR+'30');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,glowR,0,Math.PI*2);ctx.fill();

  // 중앙 항성
  const sg=ctx.createRadialGradient(cx-r*.3,cy-r*.3,r*.05,cx,cy,r*pulse);
  sg.addColorStop(0,'rgba(255,255,255,1.0)');
  sg.addColorStop(0.3,STAR_COLOR2);
  sg.addColorStop(0.7,STAR_COLOR);
  sg.addColorStop(1,'rgba(40,15,60,1.0)');
  ctx.beginPath();ctx.arc(cx,cy,r*pulse,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,r*pulse,0,Math.PI*2);ctx.strokeStyle=STAR_COLOR2+'AA';ctx.lineWidth=1;ctx.stroke();

  // 신호 노드들 (궤도 위 6개) — 뒤쪽 먼저
  const positions=zones.map(z=>{
    const a=z.angle+frame*0.002;
    const zx=cx+Math.cos(a)*orbR,zy=cy+Math.sin(a)*orbR*0.55;
    return {z,zx,zy,behind:Math.sin(a)<0};
  });
  positions.filter(p=>p.behind).forEach(({z,zx,zy})=>drawZone(z,zx,zy,0.55));

  // 연결선 (항성 -> 노드, 패턴 표시중)
  positions.forEach(({z,zx,zy})=>{
    if(z.state==='lit'||z.state==='flash'){
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(zx,zy);
      ctx.strokeStyle=z.col+'77';ctx.lineWidth=2;ctx.stroke();
    }
  });

  // 앞쪽 노드
  positions.filter(p=>!p.behind).forEach(({z,zx,zy})=>drawZone(z,zx,zy,1));

  // 반짝이는 입자 (배경 우주먼지)
  if(!window._sigSparkles){
    window._sigSparkles=Array.from({length:12},()=>({
      angle:Math.random()*Math.PI*2,dist:0.5+Math.random()*1.8,
      phase:Math.random()*Math.PI*2,speed:0.02+Math.random()*0.03,
      col:ZONE_COLORS[Math.floor(Math.random()*ZONE_COLORS.length)]
    }));
  }
  window._sigSparkles.forEach(sp=>{
    sp.phase+=sp.speed;
    const tw=0.3+Math.sin(sp.phase)*0.7;
    if(tw<0.12)return;
    const spx=cx+Math.cos(sp.angle)*r*sp.dist*2.2,spy=cy+Math.sin(sp.angle)*r*sp.dist*1.2;
    ctx.beginPath();ctx.arc(spx,spy,1+tw*1.5,0,Math.PI*2);
    ctx.fillStyle=sp.col;ctx.globalAlpha=tw*0.6;ctx.fill();ctx.globalAlpha=1;
  });

  // 라운드 텍스트 (항성 중앙)
  ctx.font='bold 20px monospace';ctx.textAlign='center';ctx.fillStyle='#fff';
  ctx.fillText(round.toString(),cx,cy+7);
  ctx.font='8px monospace';ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.fillText('ROUND',cx,cy+r*pulse+16);

  frame++;requestAnimationFrame(loop);
}

function drawZone(z,zx,zy,scaleAlpha){
  const baseR=30;
  let fillA=0.12,strokeA=0.4,size=baseR;
  if(z.state==='lit'){fillA=0.85;strokeA=1;size=baseR*1.25;}
  else if(z.state==='flash'){fillA=0.9;strokeA=1;size=baseR*1.3;}
  else if(z.state==='correct'){fillA=0.6;strokeA=1;size=baseR*1.15;}
  else if(z.state==='wrong'){fillA=0.6;strokeA=1;size=baseR*1.15;}

  const col=z.state==='correct'?'#27AE60':z.state==='wrong'?'#e74c3c':z.col;

  // 글로우
  if(z.state!=='idle'){
    const zg=ctx.createRadialGradient(zx,zy,0,zx,zy,size*2);
    zg.addColorStop(0,col+'AA');zg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=zg;ctx.globalAlpha=scaleAlpha;
    ctx.beginPath();ctx.arc(zx,zy,size*2,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  }

  // 본체
  const zg2=ctx.createRadialGradient(zx-size*.25,zy-size*.25,size*.05,zx,zy,size);
  zg2.addColorStop(0,'rgba(255,255,255,'+(0.5*fillA)+')');
  zg2.addColorStop(0.5,col+Math.round(fillA*255).toString(16).padStart(2,'0'));
  zg2.addColorStop(1,'rgba(0,0,0,0.85)');
  ctx.globalAlpha=scaleAlpha;
  ctx.beginPath();ctx.arc(zx,zy,size,0,Math.PI*2);ctx.fillStyle=zg2;ctx.fill();
  ctx.strokeStyle=col+Math.round(strokeA*255).toString(16).padStart(2,'0');
  ctx.lineWidth=2;ctx.stroke();

  // 심볼
  ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,1.0)';
  ctx.fillText('✦',zx,zy+5);
  ctx.globalAlpha=1;
}

resize();
window.addEventListener('resize',resize);
feed('[SIGNAL] 패턴을 기억하고 같은 순서로 신호 노드를 클릭!');
loadSauBalance();
loop();
</script>
<script src="/dot/avatar-widget.js?v=20260703d"></script>
<script>
AvatarWidget.init({
  game: 'star_signal',
  concept: '수읽기',
  startText: '신호 해독 게임입니다! 패턴을 읽어내는 힘은 바둑의 수읽기와 똑같아요. 상대의 신호를 먼저 읽는 사람이 이깁니다.'
});
</script>
</body>
</html>
